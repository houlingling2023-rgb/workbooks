var DATA=[{"slug": "tim", "no": 1, "title": "AI 真正打破的不是岗位，是“努力有回报”这个信念", "quote": "“AI 时代打破了一个最核心的点，就是努力有回报，没有回报。”", "take": "别再用努力时长给自己安全感；愿意学的拦不住，不愿学的推也没用。"}, {"slug": "tim", "no": 2, "title": "AI 时代最不安全的，恰恰是你以为的护城河——“创意”", "quote": "“创意是绝对不安全的——你怎么确定你的想法配 AI，就比别人的更好？”", "take": "当“会不会做”被抹平，唯一的稀缺不再是“会做”，而是“是不是你”。"}, {"slug": "tim", "no": 3, "title": "AI 拼不起来的，是你那块“人生经历”的基石", "quote": "“AI 没有办法做忒修斯之船……人生经历还是塑造你最本质的基石，这是你的 cornerstone。”", "take": "越是什么都能被生成的时代，你被冤枉、熬过的那段经历越值钱——别轻看它。"}, {"slug": "tim", "no": 29, "title": "看似机械的执行岗里藏着最不可替代的判断力——剪辑其实是导演", "quote": "“像剪辑这种执行性的工作，很多人会误以为他就是个剪辑工，但其实他是导演，我认为他比导演更重要。”", "take": "重估你自己那份&#x27;执行工&#x27;——很多看似机械的岗位本质是决策岗，找到里面那块不可替代的判断力，别把自己当工具。"}, {"slug": "tim", "no": 5, "title": "别又做小众的东西，又怪大家不懂你", "quote": "“你必须能感知大众的情绪，你才可以获得增长。”", "take": "想要增长，就别把“没人懂我”当勋章；先想清楚你要小众还是大众。"}, {"slug": "tim", "no": 10, "title": "比短视频更猛的，是“把短视频拼成的长视频”", "quote": "“人是越来越懒的——长视频需要选择点，短视频需要滑动，但把短视频拼成的长视频，你连划都不用划。”", "take": "顺着“人越来越懒”想产品形态：谁把用户的动作减到最少，谁赢。"}, {"slug": "tim", "no": 13, "title": "断章取义不是误读，是借你的嘴说他的话——视频比文字更危险", "quote": "“解构视频比解构文字更恐怖，因为有太多种减法可以去切开你的内容。每个人都可以从同一句话里读出他想要表达的东西，他只是借你的话来表达他的东西。”", "take": "你公开说的每句话都会被切片重组——发表前先问&quot;这句脱离语境会被谁拿去当刀&quot;，而不是幻想原意能完整传达。"}, {"slug": "tim", "no": 14, "title": "你做内容越来越low，不是你堕落，是博眼球军备竞赛把你逼极端了", "quote": "“当最终都在博眼球的时候，表达就会极端化。所以我们做封面也只能跟着极端起来，不然别人根本不会点进来，我都不用看里面内容我就输给营销号了。所以标题党这件事变得史无前例的重要。”", "take": "看清&#x27;极端化&#x27;是竞争结构逼出来的而非个人选择，你才能清醒决定要不要跟、跟到哪——而不是边跟边骂自己。"}, {"slug": "tim", "no": 16, "title": "精英式高密度表达正在失效，真实平视的姿态反而赢人", "quote": "“五年以前的互联网在乎精英式表达，做得很板正、特别漂亮的置景、侃侃而谈。但这两年做内容你必须接地气的平视化表达，大家已经开始拒绝精英式高密度表达了，更真实的表达会更好。”", "take": "做自媒体、做演讲、做PPT，别再把精致包装当加分项——真实、平视、接地气的姿态现在更能赢人。"}, {"slug": "tim", "no": 23, "title": "赚钱和赚播放量是两件事，必须拆开——别两头不讨好", "quote": "“赚钱就赚钱，赚播放量就播放量，这两个事必须得拆开。你要做爆款内容就别想做商单，要做商单就别经常去想做爆款内容。两者结合的内容确实有，但是很少很少。”", "take": "每做一件事先认清它是&#x27;赚钱&#x27;还是&#x27;赚声量&#x27;的——又要叫好又要叫座多半两头落空，先选准这一笔做哪件。"}, {"slug": "tim", "no": 27, "title": "播客的本质是&#x27;经历偷取&#x27;——决定一切的是请谁，不是运镜", "quote": "“播客基本上是在做一件叫&quot;经历偷取&quot;的事情，你偷取的是这个人一辈子的人生经历。所以取决于请谁，你偷的是谁的经历。”", "take": "在&#x27;选对象&#x27;和&#x27;改方法&#x27;之间，先把力气花在选对人/选对题上——运镜、切镜头都是次要的，请谁才决定价值上限。"}, {"slug": "tim", "no": 28, "title": "做爆款的关键是敢扔——不重要的就得砍，舍不得就永远做不出超级爆炸", "quote": "“不重要的就得扔掉，必须得舍得，你不舍得就永远做不了一个超级爆炸。”", "take": "做内容、做方案、做汇报，&#x27;敢删&#x27;往往比&#x27;多加&#x27;更难也更值钱——把不重要的砍干净，才有超级爆款。"}, {"slug": "tim", "no": 6, "title": "核心能力不可复制，就去嫁接一个能复制的载体", "quote": "“我做一期是一期，每次都要给厂商想个新的创意。”", "take": "本事是一次性的（一单单接、一稿稿写），就找个能躺着复利的变现载体挂上去。"}, {"slug": "tim", "no": 8, "title": "慷慨会失控，公平才长久；分钱不分股", "quote": "“你不是分得越多越好的。”", "take": "合伙别靠“我对你够意思”维系，靠“谁干多少拿多少”。"}, {"slug": "tim", "no": 11, "title": "“站着把钱挣了”靠的不是自律，是商业模式", "quote": "“我们羊毛尽可能不出在羊身上……互联网时代你收费、别人不收费，你就干不过它。”", "take": "想保持独立先问钱从哪来：靠谁吃饭，就很难对谁说真话。"}, {"slug": "tim", "no": 17, "title": "你可以不喜欢短剧，你不可能不喜欢钱——鄙视链最终都老实了", "quote": "“做短剧的赚的可比骂的人赚的多多了，最终大家都老实了。就是你可以不喜欢短剧，你不可能不喜欢钱吧。”", "take": "下次你想骂某件事&#x27;low&#x27;之前，先问问它是不是比你赚得多——让人闭嘴的从来不是品味，是钱。"}, {"slug": "tim", "no": 18, "title": "别把运气当能力来奖励——爆款里踩中风口的成分巨大", "quote": "“内容行业特别难公平——你有内容火了，并不是因为你做的东西好而火，而是这个事件正好踩中了火，那你因为这件事去奖赏他而不奖赏另外一个人，那很奇怪。”", "take": "做绩效、论功行赏时先剥掉运气成分——按结果裸奖会把运气包装成能力、扭曲整个团队的努力方向。"}, {"slug": "tim", "no": 19, "title": "甲方最可怕的不是不懂内容，是他根本不要好片子，只想借你达成他的诉求", "quote": "“你会发现他要的不是你的片子，他也不是要你做好内容，他就是要借你来达成他的诉求，这时候这事就特别恐怖。”", "take": "接活、做服务、向上汇报前，先识别对方藏着的真实诉求——你死磕&#x27;把片子做好&#x27;时，他要的可能根本不是片子。"}, {"slug": "tim", "no": 22, "title": "过早商业化会把人榨干——先做差异化、过百万粉再谈变现", "quote": "“过早的商业化其实是挺伤的，投入期很长。一定要先做差异化，至少粉丝量到100万以上，再来研究真正意义上的商业化，不然你会被定性，就很难了。商业化会把一个人完全榨干。”", "take": "想靠副业、个人IP赚钱，先攒够资产再变现——一上来就接活会透支口碑、把自己定性死，先把内容做好。"}, {"slug": "tim", "no": 25, "title": "用一个KPI考核复杂工作必被钻空子——抽奖涨粉最快", "quote": "“最大挑战就是怎么切蛋糕。内容行业很难界定大家的客观产出价值，不好量化，单一维度都没办法去形容一个人的表现。”", "take": "给团队设考核别迷信单指标——任何单一KPI都会被钻空子（要涨粉？抽奖最快），用综合的客观竞争力来衡量。"}, {"slug": "tim", "no": 7, "title": "弱小的时候，唯一该焦虑的是“没有对手”", "quote": "“现在主要是没有太多竞争对手才是坏事。”", "take": "没人跟你抢不是安全，是这条赛道还没大到值得抢。"}, {"slug": "tim", "no": 9, "title": "“他是靠资源”的归因，多半是失败者给自己找的解释", "quote": "“我前提就不应该搜这个事。”", "take": "别人怎么归因你的成败，多半在解释他们自己；破不了你防，是练出来的。"}, {"slug": "tim", "no": 12, "title": "“该稳还是该冒险”之外有第三条路：把险算清，再去", "quote": "“凡人皆有一死——有些事我 50 多岁拼一把死了也值得，25 岁我未必这么想。”", "take": "他不是不怕死，是把疯狂也拿去做了风险建模。莽撞和怂之间，是建模。"}, {"slug": "tim", "no": 20, "title": "把最坏结果先想透、底牌备好，反而换来日常的稳定心态", "quote": "“真的翻车来的时候——我早就说了，公司留了足够多的现金，给大家分了钱直接散，我早就想好。”", "take": "面对风险别靠&#x27;希望它别发生&#x27;撑着——把最坏结局想到底、把底牌（现金、退路）备好，反而能日常心态极稳。"}, {"slug": "tim", "no": 21, "title": "社恐也能营业——靠的不是性格，是卡点提前五到十分钟的心理建设流程", "quote": "“我虽然很社恐，要营业的时候也可以，只是需要一个心理建设过程，比如五到十分钟，卡着点快到了我就开始搞心理建设，到那以后就满面春风、能接待。”", "take": "见客户、上台、汇报前，给自己留五到十分钟定时预热——把&#x27;外向&#x27;当成可执行流程而不是天生性格。"}, {"slug": "tim", "no": 30, "title": "抵御负评的最强能力，不是承受力，是从源头就不去搜", "quote": "“久了以后你就觉得没必要去在意，我前提就不应该搜这个事。这是我这几年锻炼出来最强的能力，破不了我的防。”", "take": "对付网络负评别去练&#x27;更强的玻璃心&#x27;——最强的办法是前提上就不去接触它，不给它破防的机会。"}, {"slug": "tim", "no": 31, "title": "嘲笑你梦想的人，是要靠嘲笑获得自己活下去的勇气", "quote": "“我对那些嘲笑别人梦想的人完全脱敏了，因为他们可能要通过嘲笑别人的梦想来获得自己活下去的勇气，所以没必要被打击。”", "take": "被泼冷水、被笑梦想时，把它读成&#x27;对方的心理需求&#x27;而不是&#x27;对你的判断&#x27;——他在喂自己，不是在评你。"}, {"slug": "tim", "no": 4, "title": "听一个人预测他自己的行业，先看他屁股坐哪", "quote": "“我怀疑他们也是有点害怕的，只是因为在做这个，所以要表示乐观——不然以后出了 AI 功能，不就打脸了吗？”", "take": "把“他靠什么吃饭”和“他说的话”绑一起看，乐观 / 悲观都先打个折。"}, {"slug": "tim", "no": 15, "title": "响度、亮度、HDR、摇一摇——你的注意力正被一整套军备竞赛偷走", "quote": "“和十年前的视频的响度差了超级多，所有人都在偷偷把音量往上拉，所以所有视频平台大家都在比谁叫得更响，因为你第一秒就要让它感受刺激。现在所有的广告都开始做 HDR、会特别亮，这是厂商用 HDR 广告抢你的注意力。”", "take": "意识到响度、亮度、弹窗都是被设计出来刺激你的，是你对信息环境保持清醒的第一步——别把&#x27;被勾住&#x27;当成自己感兴趣。"}, {"slug": "tim", "no": 24, "title": "复盘成功比复盘失败更稀缺——搞不清自己为什么火，就守不住", "quote": "“要参透，有点本质就是参透，就是你为什么会火，这几点很重要，必须得参透。”", "take": "取得过成绩后别只忙着复制动作——花力气搞清&#x27;我到底为什么成&#x27;，否则会稀里糊涂地成、再稀里糊涂地败。"}, {"slug": "tim", "no": 26, "title": "数据不等于信息——拉了一堆数却不会用，是缺了&#x27;映射&#x27;这一步", "quote": "“数据和信息不一样，数据是个原始的东西，信息才是有效的东西，所以这个转化很重要。”", "take": "别满足于&#x27;我把数拉出来了&#x27;——把原始数据映射成能拿来做决策的信息，那一步才是真正的分析。"}, {"slug": "zhouhongyi", "no": 1, "title": "幻觉消除不了，因为它就是大模型智能性和创造力的来源", "quote": "“一个叫幻觉，大模型一定有幻觉而且消除不了，为什么？幻觉是它智能性的体现，没有幻觉的东西就没有想象力、没有创造力，但是幻觉在很多场合又非常有害，对吧，给你瞎编乱造的东西。那怎么利用外部知识、搜索外部全网的检索、利用内部知识库去减少幻觉，这是我们现在已经解决得比较好的一个问题。”", "take": "别指望把幻觉关掉，那等于关掉创造力；你要做的是用外部知识库和检索去『压低』它，而不是『消灭』它。"}, {"slug": "zhouhongyi", "no": 2, "title": "你对大模型说的每句话既是数据又是指令，所以人人都能变成黑客", "quote": "“大模型有一个致命的特点，你跟他说的每句话既是他处理的数据，又可以变成对他的指令。过去比如说，你如果没有学过编程、不懂计算机语言，你就没办法写程序、就没办法攻击一套系统、做不了黑客；但现在系统都是大模型的，你会 PUA 它、对吧，你会套路它，你只要给大模型说话，只要你能套路得好，大模型就会听你的。”", "take": "凡是接了大模型的系统，会说话就能攻击它；做产品时永远假设用户的输入可能是在『套路』你的 AI。"}, {"slug": "zhouhongyi", "no": 3, "title": "不是 AI 淘汰人，是会用 AI 的人淘汰不会用 AI 的人", "quote": "“所以我说不是 AI 淘汰人，是会 AI 的人淘汰不会 AI 的人，这个大家听到心里比较舒服，事实也是如此。”", "take": "焦虑『AI 会不会取代我』没用，真正要做的是成为同岗位里最会用 AI 的那个人。"}, {"slug": "zhouhongyi", "no": 4, "title": "大模型让不了你成超级个体，管着几十个智能体才行", "quote": "“大模型没法让你成为超级个体，因为他还是个聊天玩的工具；但是真的你如果能做出几十个智能体……你自己管着三四十个智能体，那么相当于有三四十个赛博牛马帮你打工，你每天睡觉摸鱼他就帮你干活，那这不你就成为超级个体了。”", "take": "光会跟 ChatGPT 聊天成不了超级个体；目标是搭出一队替你 24 小时干活的智能体，你来当那个管理者。"}, {"slug": "zhouhongyi", "no": 5, "title": "智能体角色越窄能力越强，让它当通用专家反而废", "quote": "“你不能给智能体赋予两个不同的专业角色。也就是说，你让大模型同时扮演一个通用专家的时候，他的能力是低下的；但如果你让他就扮演某一个领域的专家，越窄，那这个智能体的能力我认为越强。”", "take": "搭智能体别贪多，一个智能体只给一个窄角色；想要全能就用多个窄智能体拼，而不是造一个万能的。"}, {"slug": "zhouhongyi", "no": 6, "title": "智能体会像人一样倦怠：指令太多就拒绝、乱执行或敷衍", "quote": "“智能体会出错，但这个出错既不是幻觉也不是训练的问题，是他像人一样会倦怠。一个智能体你给他指令太多、让他干太多的活，他做到一定时候会拒绝执行指令，或者开始乱执行指令、会敷衍。”", "take": "智能体出错不一定是幻觉，可能是你给它压了太多活——像管员工一样给它减负、拆任务。"}, {"slug": "zhouhongyi", "no": 7, "title": "单智能体做90秒就因倦怠走不下去，成片必须几十个智能体协作", "quote": "“单智能体我们试验，大概由于倦怠的问题，做 90 秒就走不下去了。所以我们现在通过大概几十个智能体的协作，能够基本做出 15 分钟的、一刀不剪最后能成功做出来的成片。”", "take": "想用 AI 做长内容，别指望一个智能体扛到底；把流程拆给几十个分工协作，才扛得住出错率相乘。"}, {"slug": "zhouhongyi", "no": 8, "title": "大模型不是越大越强：看一千万字地摊文学不如做一年高考习题", "quote": "“比如说你每年都看一千万字的地摊文学，我只做高考习题，一年下来之后，咱俩的推理能力肯定你不如我。”", "take": "喂数据（给模型也给自己）别只比量；高浓度的优质内容，胜过十倍体量的垃圾输入。"}, {"slug": "zhouhongyi", "no": 9, "title": "用 AI 扫题解题害小孩，用 AI 一步步辅导才有帮助", "quote": "“那你比如说，如果你叫他扫题、解题，那对小孩是最大的危害；但如果你能让智能体进入到一种辅导状态，就是你问我什么题目，我能推断你不会做是缺少什么知识点，让我一步一步给你讲解，那我觉得对小朋友就是有帮助。”", "take": "让 AI 直接给答案是在废掉学习能力；要把它调成『一步步带你讲解』的家教模式，才真有用。"}, {"slug": "zhouhongyi", "no": 10, "title": "智能体不能是黑盒：必须人在回路，每步透明、停下来等人批准", "quote": "“虽然它能自动做，但是还有一个关键叫&quot;人在回路&quot;。人在回路很重要，不能让智能体变成一个黑盒子。”", "take": "让智能体自动跑可以，但关键节点要它停下来等你确认；保留每一步可追溯，别交出黑盒子。"}, {"slug": "zhouhongyi", "no": 11, "title": "流量越大反噬越大，知道你的人越多就一定有人看你不顺眼", "quote": "“流量它是会有反噬作用的，你流量越大、知道的人越多，就一定会有人看你不顺眼，你不可能让所有人都喜欢你。”", "take": "做内容涨粉的同时就在累积黑粉，这是流量的代价；别为『让所有人喜欢』内耗，接受被一部分人讨厌。"}, {"slug": "zhouhongyi", "no": 12, "title": "粉丝数只是参考：平台靠推荐不靠关注给流量，别把粉丝当包袱", "quote": "“现在各平台都很狡猾，它是为了不断地用鞭子鞭打你，并不是你有了粉丝就高枕无忧、每天流量就很丰厚。”", "take": "别盯着粉丝数自我安慰——平台是按内容推荐分发的，每条都得重新证明自己，停更就没流量。"}, {"slug": "zhouhongyi", "no": 13, "title": "证明能力选视频不选万字报告：视频好坏人人能判断", "quote": "“文无第一武无第二，你写了万字报告，我请你看效果怎么样，你可能懒得看，你只能说不错不错，你看写了一万字；但视频谁一看好跟坏谁都能判断出来。所以我们就选视频来证明”", "take": "想让人快速信你的实力，选一个『好坏一眼可辨』的场景去秀，别用没人有耐心评判的长报告。"}, {"slug": "zhouhongyi", "no": 14, "title": "泡沫是好东西：没有泡沫就吸引不来人才和资金", "quote": "“我觉得一个行业能这么快速发展，一定有泡沫。这个潜台词老是认为泡沫是坏东西，但我一直觉得泡沫是个好东西，没有泡沫怎么会大家往里去做投入呢？这些聪明人怎么会投资这个行业呢？如果一个行业没有泡沫，就进入稳定期、平均利润水平了。”", "take": "看到一个赛道有泡沫别急着唱衰——没泡沫说明没人愿意进来赌，那才是真没机会。"}, {"slug": "zhouhongyi", "no": 15, "title": "护城河不是壁垒，是快速移动；弱者唯一的优势就是 quickly move", "quote": "“护城河就是在今年这样一个一日如一年的时代，护城河就是快速地响应、快速地反应、快速地调整……所以在战场上，当你是一只比较弱小的队伍的时候，你唯一的优势就是 quickly move、快速移动。就像跟拳击手打拳似的，我唯一学过来打拳的方法，就是跟厉害的对手保持距离、快速移动，让他不能琢磨你往哪儿跑，别被他控制在墙角。”", "take": "你弱的时候别想着筑墙，想着跑——保持高频调整、别被对手摸清节奏、别被逼到墙角。"}, {"slug": "zhouhongyi", "no": 16, "title": "成功公司大多是用简单技术做对了市场，再加大技术投入", "quote": "“其实我们看过很多公司，刚开始你说包括抖音也好、今日头条也好、阿里巴巴也好，最开始起家创业的时候，谁的技术就很高深呢？也没有，都是用简单的技术做对的市场，然后有了市场被认可之后，再在技术上投入更多而已。”", "take": "别等技术做到完美再上线；先用最简单能跑的版本验证市场对不对，被认可后再砸技术。"}, {"slug": "zhouhongyi", "no": 17, "title": "不能拿互联网旧船票登 AI 的船：免费铺流量靠广告挣不回钱", "quote": "“不能拿互联网的旧船票登今天人工智能的船。人工智能成本很高，所以再去铺用户、把流量弄得很高，最后为了做服务你的成本很高，靠广告说白了不一定能够把钱挣回来。”", "take": "做 AI 产品别照搬『免费拉新+广告变现』那套；推理成本摆在那，从第一天就想清楚怎么收费。"}, {"slug": "zhouhongyi", "no": 18, "title": "评价 AI 软件别再看 DAU/留存：转成收费，多久用一次有价值就行", "quote": "“互联网时代你很重视 DAU、很重视留存率，那么你如果让用户每天都用，你就要靠它各种需求，你就不可能很垂直；如果你特别垂直，又是免费应用，你的留存率必然很差，这数字没法看，因为深度研究不会天天都用，可能一星期能用一次，那这个数据你就没法看。所以我认为如果转成收费的就无所谓了，你多长时间用一次只要有价值就行。”", "take": "用 DAU/留存衡量垂直 AI 工具会逼你做泛做免费；改用『单次是否值钱』来判断，一周用一次也成立。"}, {"slug": "zhouhongyi", "no": 19, "title": "挖天价 AI 人才是战术不是战略：算法都公开，买的是工程化 know how", "quote": "“他们这种挖人都是一种战术型挖人，不是战略型挖人。为什么呢？因为做 Transformer 很多东西是公开的，你只要肯读论文，算法都是公开的……所以大家有时候挖这些人，就是为了买经验、买这些关键节点的 know how。”", "take": "别被『天价挖人』唬住——核心算法是公开的，真正稀缺的是把它跑通的工程经验和关键节点踩坑。"}, {"slug": "zhouhongyi", "no": 20, "title": "发钱解决不了 AI 失业：人没工作就失去尊严、心态失衡", "quote": "“这个可不像说马车夫失业了可以去开出租车那么简单，实际上人类的文明社会伦理有没有为这个做好准备？……就算可以领到失业救济金，他没有工作就没有了尊严之后，他的心态会失衡，这个社会会出问题。就像乌托邦实验，把一帮老鼠关在一个吃喝不愁的地方，反倒出问题。”", "take": "工作对人的意义不只是收入，更是尊严；面对 AI 冲击，给自己找到『被需要』的位置比领钱更重要。"}, {"slug": "zhouhongyi", "no": 21, "title": "人相比机器唯一的优点是能耗低，其余全是劣势", "quote": "“就是人跟机器相比，人有很多缺点，人只有一个优点是什么？就是能耗低。”", "take": "放下人类优越感：机器可复制、带宽光速、不会死，你的优势只剩能耗低——所以要学会跟它结合而非硬刚。"}, {"slug": "zhouhongyi", "no": 22, "title": "面对 AI 不能把它当鲨鱼，要当海洋，跳进去游泳", "quote": "“你不能把对方看成鲨鱼，比如说你要把它看成海洋，那我应该跳到海洋里去游泳，而不是我做一条鱼……所以有句话叫&quot;打不过就加入&quot;，这句话挺对的。”", "take": "别把 AI 当来吃掉你的威胁，把它当你要学会游的环境——打不过就加入，越早下水越主动。"}, {"slug": "zhouhongyi", "no": 23, "title": "多智能体协作不是 API 互调，是给真人设计工作流程和企业文化", "quote": "“做智能体协作就完全像给真人设计一个工作流程、工作链条和企业文化。”", "take": "搭 AI 工作流时换个脑子：不是在连模块，而是在『管一支团队』——设计岗位、交接和规矩。"}, {"slug": "zhouhongyi", "no": 24, "title": "真正值钱的是藏在人脑里的『暗知识』，不是写在网上的亮知识", "quote": "“人类有很多知识写在纸上能找到、写在网上，叫亮知识、看得见的；真正有价值的是暗知识、浅知识或者隐含的知识，是在人们的心里、脑子里。”", "take": "你的不可替代性不在能搜到的亮知识，而在没写下来的经验和判断——那才是 AI 抄不走的护城河。"}, {"slug": "zhouhongyi", "no": 25, "title": "学数理化不是为了直接用，是重塑大脑网络——就像往大模型灌知识", "quote": "“你学中学数学、学物理、学化学的时候，它对你的大脑进行了重新的塑造，使得你大脑形成了一种网络，可能在解决其他问题的时候它有效果，你自己没有意识到。就跟今天人们往大模型里灌很多知识的时候一样。”", "take": "别因为『有 AI 了就不用学』而停止学习——你学的每样东西都在重塑大脑网络，在别处悄悄起作用。"}, {"slug": "zhouhongyi", "no": 26, "title": "费曼学习法：能用自己的话讲清楚，才算真学会", "quote": "“有一种叫&quot;费曼学习法&quot;，就是怎么验证自己学会了呢？就是你能用自己的语言把它讲清楚。”", "take": "检验自己有没有真懂，别靠『感觉懂了』——试着用大白话讲给外行听，卡壳处就是你没吃透的地方。"}, {"slug": "zhouhongyi", "no": 27, "title": "看新生事物，多数人挑缺点，你要看它的潜力", "quote": "“很多人看一个新生事物，大部分人看缺点、挑它不完美的地方，但我们是看它的潜力，觉得这玩意不可限量。”", "take": "面对早期的新东西，先别急着数它的毛病——问自己『它好的那一面如果成立会怎样』，机会藏在潜力里。"}, {"slug": "zhouhongyi", "no": 28, "title": "中美 AI 差距在格局不在技术：BERT 大家都在用，没人想到灌进全人类知识", "quote": "“没有一家公司、包括国内的大公司，想到说把人类所有的知识都灌到大模型里去看会发生什么效果。我们拿BERT做什么？做搜索结果的推荐、广告的优化、内容点击率的提升，所以还是没人的格局高。”", "take": "同样的工具在手，差距往往不在技术而在你敢不敢想大——别只拿它优化点击率，想想它最大能干成什么。"}, {"slug": "lixiang", "no": 1, "title": "评价AI&quot;司机&quot;智能体就五项：选路、控速、平顺、安全、沟通——拿衡量人的指标衡量AI", "quote": "“我们评价一个职业司机：第一，他有没有选对路；第二，有没有控制好速度；第三，开得是否平顺舒适；第四，是否安全；第五，沟通是否容易。我们做 AI、尤其做智能体阶段，就应该拿人的指标来衡量。”", "take": "评价一个AI智能体别只盯技术参数——用你评价一个干这活的人的标准去量它，维度立刻清晰。"}, {"slug": "lixiang", "no": 2, "title": "AI不会取代所有工具，反而回归到调用工具——智能体跟人一样要用工具", "quote": "“他认为智能体能干所有的,可今天智能体还要去调用工具,跟人一样要去使用工具。”", "take": "别再幻想一个模型吞掉所有应用——未来的AI更像会用工具的人，能力来自&quot;调用&quot;而非&quot;全能&quot;。"}, {"slug": "lixiang", "no": 3, "title": "真正的iPhone时刻要到智能体阶段才出现；ChatGPT3.5更像AOL聊天室、黑莓塞班", "quote": "“我觉得只有到智能体阶段才会产生 iPhone 时刻——ChatGPT 3.5 不是 iPhone 时刻,它更像互联网早期的 AOL 聊天室(而不是 Google 出现),或者手机时代的黑莓、塞班(而不是 iPhone)。”", "take": "现在还不是AI的革命终局——别把&quot;第一个让你惊艳的产品&quot;当成iPhone时刻，真正的拐点还在后面。"}, {"slug": "lixiang", "no": 4, "title": "知识能力AI会超越人类，但决定文明的是智慧；被AI倒逼实现智慧跃迁是人类唯一的机会", "quote": "“以后知识不是问题了,我们的学校也不培养任何智慧,那人类会不会因为 AI 的倒逼,获得一次智慧的跃迁?我觉得这可能是人类唯一的机会。”", "take": "AI很快比你懂得多、能力强，别在知识量上跟它较劲——你真正该升级的，是它给不了的那部分智慧。"}, {"slug": "lixiang", "no": 5, "title": "用用户能看懂的视角表达：不说&quot;空间多少毫米&quot;，说&quot;前面还有几拳&quot;&quot;能放可乐还是麦当劳&quot;", "quote": "“过去大家都写&quot;车内空间多少毫米&quot;,我们不是——我们告诉你&quot;你坐在这里前面还有几拳&quot;;不是&quot;杯架多宽&quot;,是&quot;能放可乐还是能放麦当劳&quot;。我们全变成这种方式来写,一下就大受欢迎。”", "take": "把你的参数和卖点，全部翻译成对方身体能感知的画面——别人不为&quot;毫米&quot;买单，为&quot;还有几拳&quot;买单。"}, {"slug": "lixiang", "no": 6, "title": "做超级产品没有捷径：天才+毫无保留地付出，得跟团队生活在一起，而不是定期评审的老板", "quote": "“研发一辆车,你跟这辆车到底付出多长时间,没什么捷径,当然你还得有水平——得是一个天才的产品经理加上毫无保留的付出。你得跟设计团队、研发团队、产品团队生活在一起,而不是&quot;我是个老板、定期去做个评审&quot;,那肯定不行,那只有吃老本的旧世界油车的老板才那样。”", "take": "想做出极致的东西，靠定期开评审会遥控是做不出来的——你得泡进团队里，把命押上去。"}, {"slug": "lixiang", "no": 7, "title": "遇到困难越大越要尽早跟团队和投资人讲，因为每个人都希望被需要", "quote": "“第二,我遇到任何困难都跟团队讲,越大的困难越讲。那时候不跟他们讲,一是自尊心、自己扛了,但后来发现这是完全错的。你跟核心管理层、跟投资人一五一十地讲,不要到快死的时候再讲——当你遇到困难就跟他们讲,因为每个人都希望在你身边贡献他的价值,大家都希望自己是被需要的。”", "take": "别等到快撑不住才开口——越早把大麻烦摊开讲，越能调动想帮你的人，信任反而更强。"}, {"slug": "lixiang", "no": 8, "title": "先有人再有事：把人对待好，事情就水到渠成", "quote": "“后来规模做大、吃了各种亏以后,你发现其实人才是最重要的——先有人再有事,应该先把人对待好,事情就水到渠成了。”", "take": "如果你只盯着&quot;把事做对&quot;、把人当工具，迟早会吃亏——顺序反过来，先把人安顿好。"}, {"slug": "lixiang", "no": 9, "title": "乔布斯式管理的真相是&quot;先建立信任再高要求&quot;，不是简单粗暴", "quote": "“大家总拿乔布斯很早的&quot;粗暴&quot;举例,但从乔纳森那里看到的,其实是一帮人在建立信任以后的&quot;高要求&quot;,而不是简单粗暴。我们年轻时候比较傻,就学着简单粗暴,其实不是——是先建立了信任,有了信任、大家都有高标准,只要没达到就开始吵起来了。”", "take": "学偶像别只学他凶——没先攒下信任就去高要求，那只是粗暴，不会有效。"}, {"slug": "lixiang", "no": 10, "title": "员工要涨薪别做对立：先接受需求，再做内外对比，发现给低了就该涨", "quote": "“如果他要涨薪,挺简单:不要做对立。核心是——第一你先接受他这个需求;第二让 HRBP 和财务跟他做内外对比分析,我们会发现其实很多时候就是给低了——拿他现在的工作,我们出去找不到一个更好的,那就应该给人家涨,这有啥可犹豫的。”", "take": "下属提加薪，别本能防御——先接住需求，再用&quot;外面招得到更好的人吗&quot;这把尺子去量。"}, {"slug": "lixiang", "no": 11, "title": "吵架式合伙人文化的本质：把每个人的认知都掏出来，认知合并后选择自然趋同", "quote": "“这种吵架其实会把每个人的认知都掏出来,大家不用藏着掖着。很多时候我们做不同选择是因为认知不同,当每个人认知都抛出来,你发现很容易做相同选择——就像你的基础模型和他的基础模型不一样,合并成一个大的基础模型,推理结果自然就一样了。”", "take": "团队意见不合先别急着拍板——分歧多半来自认知没摊开，把各自的判断依据全倒出来，结论往往会自己收敛。"}, {"slug": "lixiang", "no": 12, "title": "产品最差的时候，恰恰是不吵架的时候——一言堂是质量隐患", "quote": "“我们产品最差的时候,恰恰是不吵架的时候——有一段时间我们把一些做产品最好的人调去做流程(让他们把最佳实践变成流程),下一级的人上来跟我做产品,就变成他们都听我的,特别痛苦。需要足够强的一堆人碰撞才行。”", "take": "会议里全员附和你，不是和谐，是警报——身边没有敢顶你的强人，产出只会越来越差。"}, {"slug": "lixiang", "no": 13, "title": "做事先看行业最大的、还没被解决的问题，而不是做前期调研", "quote": "“说实话我从来不做前期调研,我觉得跟随别人想象的都不一样。我是有过电动车的真实体验,增程率(续航)始终是个巨大问题。……所以创业进入汽车领域,我得先看这个行业最大的问题是什么——这个行业我们要进入时一定有些问题没被解决。”", "take": "调研出来的答案，往往和所有人想的一样——真正的机会藏在你亲身体验后发现的那个&quot;最大的、没被解决的问题&quot;里。"}, {"slug": "lixiang", "no": 14, "title": "只进增长市场，大盘不增长就找细分增长（二胎催生的六座车）", "quote": "“我做泡泡网时,等我明白怎么管理公司,整个电脑硬件已经进入衰退期了——在一个不增长的市场,你想成功太难,老大掌握所有优势。所以做汽车我要做个增长市场。但进入汽车市场后,发现汽车增长也不多了,我得找一个细分的增长市场。我比较敏感,发现了二胎。”", "take": "在衰退或停滞的盘子里再努力也是给老大打工——先确认你站在增长里，没有大增长就往细分里找一条还在涨的曲线。"}, {"slug": "lixiang", "no": 15, "title": "说服坚决反对的团队，靠一个外部已被验证的事实让他们自己慢慢相信", "quote": "“当然有,团队都说一定要做 PHEV、不能做增程。我用了一个比较意外的方式说服——有点连哄带骗(这也是 CEO 的必修课)。我让他们看了一件事:在日本销量最好的车是日产的 e-POWER,用的是增程结构……它在日本销量最好,超过了普锐斯,慢慢他们开始相信,我说你们至少去做一些研究测试。”", "take": "硬辩赢不了反对的团队——丢给他们一个已经被外部市场验证过的事实，让他们自己走到你的结论上。"}, {"slug": "lixiang", "no": 16, "title": "分工要背靠背、对外讲极清楚：让人知道&quot;到某人就说了算，找CEO也没用&quot;", "quote": "“我们一上来就把分工讲得特别清楚、是背靠背的。比如在汽车之家时,大家都知道我是创始人,但我不见汽车厂商,大家知道找到秦致或销售团队就能解决所有问题、不需要找李想。这也是这样:供应链最高到马东辉就能说了算,找李想也没用,所以自然就没人找我了。”", "take": "想从琐事里解放出来，光授权不够——要让外部都明确知道&quot;这事到他为止，找你也没用&quot;，越级自然消失。"}, {"slug": "lixiang", "no": 17, "title": "只做单一/极少配置：多配置是跟用户勾心斗角制造选择困难，还可能丢单", "quote": "“做一堆配置其实很多时候是跟用户勾心斗角(选择困难)。我们在汽车之家能看到,很多车做十几个配置,但真正两款配置占了 90% 的销量;从消费者角度,如果让用户有选择困难,有可能丢单。”", "take": "给用户一堆选项不是体贴，是把决策负担甩给他、并制造放弃购买的机会——敢只给一个最优解，转化反而更好。"}, {"slug": "lixiang", "no": 18, "title": "做了大厂从没做过的创新，必然出问题；保守只做没出过事的，所以不出事", "quote": "“因为我们做了很多大厂原来没做过的东西。他们是保守、永远做没出过事的,我们做的是他们从来没做过的(有创新),所以会出问题。”", "take": "你做了别人没做过的事却出了问题，先别自我怀疑能力——出问题正是创新的成本，照抄前人才不会出错。"}, {"slug": "lixiang", "no": 19, "title": "硬件壁垒只有6个月，软件和系统的壁垒能拉出一两年甚至三年以上", "quote": "“我特别相信乔布斯那句话:硬件的壁垒只有 6 个月,软件和系统的壁垒可以拉出一两年甚至三年以上。”", "take": "靠硬件领先睡不了安稳觉——半年就被追平；真正能拉开几年差距的，是软件和系统这种越用越深的护城河。"}, {"slug": "lixiang", "no": 20, "title": "知道自己没退路，反而就不担心了——压力里只找正面机会", "quote": "“我创业时一定知道一件事——我压根没有退路。当我知道自己没有退路的时候,反而就不担心了。”", "take": "焦虑往往来自&quot;还能撤&quot;的胡思乱想——把退路真正堵死，注意力反而只剩&quot;怎么往前&quot;。"}, {"slug": "lixiang", "no": 21, "title": "压力越大越本能往前走，扛过那个压力往往就是巨大转机", "quote": "“我的一个感觉是:压力越大的时候我越往前走;没什么压力的时候我往后撤一撤,有压力的时候我本能地往前走,而且很可能那个压力扛过去是一个巨大的转机。”", "take": "下次最想缩的那一刻，恰恰可能是离转机最近的一刻——别在压力峰值掉头。"}, {"slug": "lixiang", "no": 22, "title": "一个从不善待自己的人，给不了别人甜头——对自己太苛刻是个问题", "quote": "“第一,我得先对自己好。一个从来不自(我善待)的人,是不可能给别人甜头的。”", "take": "别拿&quot;苦行&quot;当美德——你对自己刻薄到极限，是没有余力真正善待团队和家人的。"}, {"slug": "lixiang", "no": 23, "title": "你不能抱怨别人没经历过某事——只有开过车才懂速度，行人不懂是因为没开过", "quote": "“我回想我当时没学开车的时候,跟他们是一样的……自己开车才知道,只有站在开车的视角你才知道速度之间什么关系。所以我就想不能怨他,因为他真没开过车。关于这件事以后,我对很多事情就理解了——你不能抱怨他为什么没经历过。”", "take": "对方&quot;不懂&quot;常常不是蠢或坏，只是没站到你那个视角——少一点抱怨，理解&quot;没经历过&quot;这件事。"}, {"slug": "lixiang", "no": 24, "title": "被欺负要凶狠地反抗一次，这是真正的成人礼——只反抗一次就管用", "quote": "“不管是校园暴力还是长大走进社会,你被欺负的时候,其实你就要很凶狠地反抗一次。我甚至把这个当成真正意义上的&quot;成人礼&quot;。有的人到三四十岁还很懦弱、一直被欺负。”", "take": "怕反抗会被孤立？现实常常相反——亮一次牙，别人反而不再把你当软柿子。"}, {"slug": "lixiang", "no": 25, "title": "最好的报复是把产品做到让对方完全跟你产生不了任何关系——回应泼脏水本身毫无意义", "quote": "“但还是说明我们的产品(得更好),报复策略不够好——我们得打到让别人没法跟我们有任何关系、完全没用的程度。对破脏水毫无意义。”", "take": "被人泼脏水时，去对线就是上钩——把劲儿全用在产品上，强到对方根本碰不到你，才是真正的反击。"}, {"slug": "lixiang", "no": 26, "title": "被黑根因还是产品不够好；该做的是把产品做更好，而不是建&quot;打黑办&quot;变成黑别人的人", "quote": "“我唯一能做的是:如果他们这么黑还能对我们产生影响,还是因为我们产品做得不够好,我们应该更努力把产品做得更好。很多人建议我建&quot;打黑办&quot;、各种策略,我不想变成这样。”", "take": "外部攻击能伤到你，多半是你还有缝可钻——把归因收回到自身、补强自己，而不是以恶制恶。"}, {"slug": "lixiang", "no": 27, "title": "跟父母做选择题而非对错题：把不可控的对错争论，转成两个都能接受的选项", "quote": "“我并没有跟父母讨论&quot;是否上大学&quot;,我跟父母讨论的是&quot;上大学还是创业&quot;——跟他们一起做个选择题,不是做个对错题。我一直强调这件事,大家很多时候太容易做对错题。”", "take": "下次争执前先停一拍：你能不能把&quot;谁对谁错&quot;换成&quot;A还是B&quot;，让对方跟你一起选，而不是逼他认输。"}, {"slug": "lixiang", "no": 28, "title": "优秀是卓越最大的敌人", "quote": "“我说的是卓越。&quot;优秀&quot;可能是&quot;卓越&quot;最大的敌人。”", "take": "你现在停留的那个&quot;已经挺好&quot;，可能正是你到不了顶尖的原因——别拿优秀当终点。"}, {"slug": "lixiang", "no": 29, "title": "卓越第三条最反人性：在一条又长又对的赛道里，比所有人更高频迭代", "quote": "“大家觉得&quot;选得准、选得长,就可以慢慢做了&quot;——错!这些人做了一个完全反人性的事,就是在一个很长、成功的赛道里,极高频率地迭代。一般人选了前两个会说&quot;我要追求完美&quot;&quot;我要更有耐心&quot;,但其实不是,你还要比别人更快的迭代速度。”", "take": "选对了方向不等于可以慢慢来——把&quot;追求完美/更有耐心&quot;换成&quot;比别人更快地迭代、更快拿市场反馈&quot;。"}, {"slug": "lixiang", "no": 30, "title": "人的成长=AI三段训练：读书是预训练，师傅带是后训练，市场反馈才是强化训练", "quote": "“基座模型比较像我们读书上课,后训练比较像有经验的师傅在带,但最后我们人类的成长是来自强化训练——真实的市场反馈来获得训练。这是个根本差别:前两个都对了之后,剩下第三个往往最难,强化训练的频次严重违反直觉。”", "take": "你读了再多书、被带得再好，缺的是第三段：高频把东西丢到真实世界里挨打、拿反馈——这一段最难也最值钱。"}, {"slug": "lixiang", "no": 31, "title": "每天只写当天的事、排序、删掉前三之后的全部——只做绝对必要的三件", "quote": "“我每天有个习惯:我只写今天的事,打出来排序,然后把前三个之后的事全删掉,只做绝对必要的。……我发现每个人只要每天把最重要的三件事做好,就非常非常厉害了;如果一天要做十件重要的事,除非他是个勤奋的天才,否则很多时候反而这十件事都做不好。”", "take": "明天的清单写完后狠心删到只剩三件——剩下的不是不重要，是会把这三件也拖垮。"}, {"slug": "lixiang", "no": 32, "title": "做不重要的事有双重隐性成本：挤占重要的事，结果烂了还得给它擦屁股", "quote": "“因为做不重要的事会影响重要的事,而且不重要的事如果结果不好,你还要为它擦屁股。”", "take": "那件&quot;顺手做一下&quot;的小事，代价不止占时间，还要赔上之后给它收拾烂摊子的时间。"}, {"slug": "lixiang", "no": 33, "title": "社恐和内向是两件不同的事——社恐严重的人不一定内向", "quote": "“我社恐很严重,其实并不内向——我小时候以为我内向,后来心理学书看多了,社恐和内向是两件事。”", "take": "别用一个标签把自己框死——你怕社交场合，不代表你天性不爱与人连接，那是两回事。"}, {"slug": "lixiang", "no": 34, "title": "创始人亲自面一堆人，本质是&quot;上免费课&quot;——被面试者是来给你上课的", "quote": "“我到今天为止,公司 18 级以上的我全都亲自面试——我对 AI、芯片、操作系统很多东西的了解都是这么来的。……早期的面试很多是&quot;上免费课&quot;——被面试的人是过来给你上课的。”", "take": "进一个不懂的新领域，最快补认知的方式之一是去面试这行的人——每场对话都是一堂免费的专家课。"}, {"slug": "lixiang", "no": 35, "title": "判断领导该不该退的唯一标准：我是不是这公司的负担、是否还胜任", "quote": "“我可能只有一个判断标准:我是不是这公司的负担。如果我是负担了、不胜任这个岗位了,就应该有自知之明撤开。”", "take": "判断自己该不该让位，别看资历和情分——只问一句：我现在是这事的助力，还是已经成了负担？"}, {"slug": "hexiaopeng", "no": 1, "title": "绝大部分企业说重视AI是&quot;假重视&quot;，只是表态", "quote": "“在 AI 方面，我觉得绝大部分企业说重视，实际上是&quot;假重视&quot;，只是单纯表态。……他说将来是金矿——一本正经，胡说八道。”", "take": "别信谁喊重视AI，看他实际投了多少时间、资源和产出。"}, {"slug": "hexiaopeng", "no": 2, "title": "判断真重视AI，看可证伪的硬指标：是否做预训练、买了多少卡", "quote": "“我曾经在一个跟 AI 很强相关的行业会上问：在座这么多企业，你们有谁在公司里面会做预训练？只有三四个人举手。你要知道下面几百个企业家，大部分做的是后训练，或者甚至连后训练都没做、就是套壳使用。”", "take": "验证一家公司是不是真做AI，问它做不做预训练、买了几张卡。"}, {"slug": "hexiaopeng", "no": 3, "title": "用AI做coding降了约22%工作量，却又增加了20%多，现在普遍微亏", "quote": "“我们公司大量用 AI 来 coding，大概降低了 22% 的工作量，但增加了额外的 20% 几的工作量——你要去检查代码、学习工具、自动测试、再次复核。”", "take": "AI写代码现在不一定省力，省下的活又被检查复核吃回去，但得提前练。"}, {"slug": "hexiaopeng", "no": 4, "title": "越浅层越载重的环节越先被AI取代，被压缩的是中游、顶层越来越强", "quote": "“越“广度”的知识整合，AI 越难。所以越强大的产品经理，AI 越取代不了；越普通的产品定义、数据的简单分析收集归纳，就是中游会被压缩，顶层越来越强大。（注：卡上&quot;越&#x27;广度&#x27;的知识整合&quot;在原文中第一处实为&quot;越&#x27;广度&#x27;的数据整合&quot;，第二处才是&quot;越广度的知识整合&quot;；卡上把&quot;AI 越难&quot;紧接在&quot;知识整合&quot;后，原话中间还隔了一句关于明知识/暗知识的插话，已合并为更贴主干的版本。）”", "take": "AI先吃掉的是中游标准化的活，往两端走——做更深的整合或更强的判断。"}, {"slug": "hexiaopeng", "no": 5, "title": "自动驾驶把几十亿公里数据压缩折叠，人类最大的约束是带宽", "quote": "“它把&quot;一万个人才会出现的一个异常情况&quot;整理出来，折叠、归纳、压缩之后变成正常能力提供给你。我们人类最大的约束是带宽问题，到了临界点，它甩掉你的速度是你都没反应过来。”", "take": "机器靠压缩海量数据把罕见异常变常态，而人受带宽限制，迟早被甩开。"}, {"slug": "hexiaopeng", "no": 6, "title": "AI最可怕的已在发生：模型脱离人互相训练、互相强化", "quote": "“现在有很多大模型训练不同的方向，然后它们会互相训练——一个模型脱离人来训练另一个模型，进行强化学习跟持续强化，互相促进另一个模型的成长。这等于有很多个 AI 大脑互相促进学习，一旦促进到一个临界点就很可怕了。”", "take": "真正的风险不是政策跟不上，而是模型之间脱离人互相教、逼近临界点。"}, {"slug": "hexiaopeng", "no": 7, "title": "脑科学带来的悲观比AI更可怕，因为永生是人性的斗争", "quote": "“脑科学的问题在于：如果一个人的大脑真的被研究清楚了，理论上你可以永生。比 AI 的强大还可怕，因为 AI 毕竟还不是人性的斗争，而永生那就是人性的斗争，更难。”", "take": "比起AI失控，能让人永生的脑科学更难收场，因为它直接动人性。"}, {"slug": "hexiaopeng", "no": 8, "title": "新技术想两三年颠覆很难：数字产业约十年，实体世界还要数倍", "quote": "“因为很多人觉得一个新技术出现两三年后就会颠覆，我是觉得特别困难——数字产业可能十年做到就很好了，而实体世界还需要数倍的时间。”", "take": "别被&quot;三年颠覆&quot;的叙事带跑，物理世界的变革要按十几年来算。"}, {"slug": "hexiaopeng", "no": 9, "title": "没跟上这波AI的企业100%会被淘汰，不管硬件还是互联网", "quote": "“这波 AI 没跟上的企业肯定 100% 全淘汰，不管硬件还是互联网。”", "take": "这一轮AI不是选做题，没跟上的行业玩家全得出局。"}, {"slug": "hexiaopeng", "no": 10, "title": "新公司最怕的不是被争议，而是被遗忘", "quote": "“但它有记忆点。新公司最怕的不是被争议，是别人都忘了。”", "take": "比起被骂，没人记得你才是致命的，有争议至少有记忆点。"}, {"slug": "hexiaopeng", "no": 11, "title": "做产品最怕没人理，其次怕被骂，全夸最好但不可能", "quote": "“最怕的是没人理你，其次怕的是无数人骂你，最好的是所有人都夸你——但这很难。”", "take": "你做的东西被骂不是最差结果，无人关注才是真正的失败。"}, {"slug": "hexiaopeng", "no": 12, "title": "99.99%的人不了解你，要用反人性的方式让他们知道你", "quote": "“你周边的人可能只占万分之一，99.99% 的人其实不了解你、不了解你的行业，你要用另外一种角度让他们知道你。这是一个完全反自己人性的逻辑。”", "take": "别只顾着让身边人理解你，真正要争取的是那群根本不认识你的人。"}, {"slug": "hexiaopeng", "no": 13, "title": "公司越差越要坚决换人，越好反而越难动", "quote": "“公司特别差的时候——很多创始人或 CEO，越差越不敢动，但错了，你越坚决，他有可能越合适，因为给了你一个契机去谈。”", "take": "团队最难的时候，正是你换人最该下手、对方也最能接受的时候。"}, {"slug": "hexiaopeng", "no": 14, "title": "瞎放权会让你成为公司最后一个知道真相的人", "quote": "“实际上有这个想法，你就有可能在瞎放权——因为你听到的消息都是被他们过滤的消息，所以你可能是整个公司最后知道真相的人。”", "take": "你以为找了牛人就能撒手，结果你听到的全是被过滤的版本。"}, {"slug": "hexiaopeng", "no": 15, "title": "有要求就有对策、汇报百分百被过滤，所以创始人必须大量下一线", "quote": "“所以你有你的要求，他有他的对策，而且他的汇报里百分之百把这都搞过，所有人都不会讲——因为所有人知道我要求他们自己干。所以做一个制造企业的创始人，必须大量到一线里面，马上就能看到&quot;你说错了&quot;，第一次警告、三次对不起，那我就动（人）了。”", "take": "下属用对策架空你的指令，你只有亲自到现场才当场看得出问题。"}, {"slug": "hexiaopeng", "no": 16, "title": "支撑高研发的核心不是融资，是自己挣", "quote": "“我觉得核心不是靠融资，核心是靠自己挣。你可以融几亿、几十亿美金……但就算融几十亿美金，你最多把研发费一年就花掉。”", "take": "靠融资撑不起持续高研发，融再多也就够烧一年，得自己造血。"}, {"slug": "hexiaopeng", "no": 17, "title": "收入要看&quot;净重&quot;不是&quot;毛重&quot;，没利润的规模是卖铁的地狱生意", "quote": "“很多公司看起来规模很大、销量很大，但都是六七万块钱的车，一台车赚一千块钱毛利、净利甚至是亏的，这不是卖铁吗？”", "take": "别被销量和规模唬住，赚不到利润的体量只是在卖铁。"}, {"slug": "hexiaopeng", "no": 18, "title": "合伙人能共患难易、共成功难，靠的是能否一起进化", "quote": "“可以共患难，很难共成功；共了患难还能共成功、还能共同成长，那真的要看运气。”", "take": "选合伙人别只看能不能扛苦，要看顺境时能不能跟你一起进化。"}, {"slug": "hexiaopeng", "no": 19, "title": "硬件的&quot;极致体验&quot;应是&quot;无短板、有长板&quot;", "quote": "“所谓的&quot;极致体验&quot;，在硬件上应该叫&quot;无短板、有长板&quot;的体验。”", "take": "做硬件别照搬互联网的极致单点，先补齐短板再立长板。"}, {"slug": "hexiaopeng", "no": 20, "title": "硬件的慢恰恰是它最高的护城河", "quote": "“但它的好处在于：变化慢、时间壁垒和制造壁垒很长很高，所以想颠覆它也很难。”", "take": "别只盯着快，慢迭代的行业里，时间和制造门槛就是别人攻不进的壁垒。"}, {"slug": "hexiaopeng", "no": 21, "title": "企业问题随规模分层：小企业是人，中大是管理，大型是组织体系", "quote": "“就是层级越多，这种人性的放大越大。绝大部分企业，我认为：小企业是创始人和高管的（问题），中大型企业基本上都是管理，大型企业基本上都是组织跟体系的问题。”", "take": "先看公司多大再找病根：小公司治人、中型治管理、大型治体系。"}, {"slug": "hexiaopeng", "no": 22, "title": "对企业最难的不是逆境鼓劲，而是顺境时不冲昏头", "quote": "“对一个企业最难的，不是在困境中如何鼓足勇气、团结团队继续向上，而是在极其顺境的时候不乱决策、不瞎做加法、控制好节奏——顺境时不冲昏头。从人性角度太难了。”", "take": "你顺风顺水时反而最该按住手，别急着加项目、加预算、加摊子。"}, {"slug": "hexiaopeng", "no": 23, "title": "想骂人，明天再骂，冷一晚九成的情况你会觉得不用骂了", "quote": "“&quot;如果你想骂他，你明天再骂&quot;，冷一晚，百分之九十几的情况下，你明天会觉得他可以不用被骂。”", "take": "气头上别发作，把骂人推迟到明天，多数怒火过夜就消了。"}, {"slug": "hexiaopeng", "no": 24, "title": "你觉得不对的方向，越早干掉越对", "quote": "“从项目管理角度，你永远应该尽早把一个你觉得不对的事情干掉。”", "take": "判断一件事方向错了，别等沉没成本攒大，越早砍越止损。"}, {"slug": "hexiaopeng", "no": 25, "title": "做难事的人需要一些&quot;忽悠&quot;来凝聚人和资本", "quote": "“你要挑战这么大一个事，还要带着一群人才能实现，有时候不管对内还是对外，你或多或少要有一些&quot;忽悠&quot;的东西，让大家把精神头提起来。”", "take": "纯讲悲观没人跟你干，干大事得有点画饼来把人和钱的劲提起来。"}, {"slug": "hexiaopeng", "no": 26, "title": "汇报到你手里的结果只有约30%是对的，70%是美化过的", "quote": "“你提的要求，他给你汇报的时候肯定是浓缩过的，这个浓缩的结果可能只有 30% 是对的，70% 是他修缮过、美化过的。你没有精力去知道哪个是修缮过的、哪个是错的、哪个才是对的。”", "take": "默认你收到的汇报有七成被修饰过，得靠下游和客户的闭环来校验。"}, {"slug": "hexiaopeng", "no": 27, "title": "判断一个部门好不好，看下游和客户闭环，别听它自己的汇报逻辑", "quote": "“我会从很多下游、一线去看一个地方做得好不好，不仅仅听这个部门的汇报。哪一个部门都有下游，最后你的一个闭环来自于市场、来自于客户，这个更容易看准，而不要听他的逻辑。”", "take": "想知道一件事干得行不行，去问它的下游和客户，别问它本人。"}, {"slug": "hexiaopeng", "no": 28, "title": "别人主动跟你讲话多半是想获取价值，要从对方利益反推", "quote": "“世界上绝大部分情况，不认识的人、或者认识的人跟你讲，他是希望获得价值、有利益的，你就要从他的角度去思考逻辑。”", "take": "有人主动找你说事，先想清楚他图什么，从他的利益倒推真实意图。"}, {"slug": "yeguofu", "no": 1, "title": "成超级爆款是偶然，批量做中等爆款是必然且足够", "quote": "“但是它一大堆中等爆款的也都很赚钱，然后出了一个超级爆款，一个带动一堆，其实也就够了。但是说成为超级超级的IP，依然是偶然性的。”", "take": "别赌一个必爆的超级款，把不可控的运气换成可经营的概率：批量出货，等那个偶然砸中你。"}, {"slug": "yeguofu", "no": 2, "title": "新IP要养，主动压低销量，别破坏性开发", "quote": "“一个新IP要养，不能破坏性开发、不要过度性消费、过度性开发，很快就没有生命了，大家就腻了。腻了就慢慢的……我明年可以做三个亿，我就做一个亿，慢慢这样成长，它的粉丝越来越多、越来越喜欢它，未来可以成为十个亿的IP。”", "take": "能赚3亿却只赚1亿——刻意留出余地，是为了让它别死得太快，把短期最大化换成生命周期最大化。"}, {"slug": "yeguofu", "no": 3, "title": "IP创作者像企业家，无法培养，只能签约野生天才", "quote": "“这些IP创作是需要灵感的，这些人是不可以跟你上班的，不可以朝九晚五的，他们KPI也没用，没有KPI，就散落在人间，最后他们出来你签约就行了……这个IP就像企业家是无法培养的，都是天生的，野生动物。”", "take": "有些能力（创作、判断）培养不出来，与其花力气培训，不如把力气花在&#x27;识别和签下&#x27;已经长成的人。"}, {"slug": "yeguofu", "no": 4, "title": "IP火不火跟历史长短无关，只跟设计力和推广力有关", "quote": "“一个IP的火跟它成立多少年没有关系，跟这个IP本身的设计能力和这个公司的推广能力有关系。今天我们所有企业家有个非常好的环境，就是社交媒体的环境，可以让你有好的产品、好的作品很快火爆全球。”", "take": "别迷信&#x27;底蕴深才更火&#x27;——社媒时代，一个三年的新IP能盖过百年老牌，拼的是设计和推广，不是年头。"}, {"slug": "yeguofu", "no": 5, "title": "胖东来卖的是货品，其他超市卖的是货架", "quote": "“胖东来是卖货品的，其他超市是卖货架的——上架费、进场费、条码费、促销费，搞一堆。但胖东来是卖产品，我不收这些费用，我就把每个产品做好，卖消费者喜欢的产品。而其他超市是为了进场费卖产品，为了条码费、为了后台费用而卖产品，而你的胖东来和山姆是为了消费者，我卖产品，消费者需要什么我卖什么，而不是谁给我钱多我卖谁的产品。”", "take": "看一门生意，先问它的钱从哪来：靠服务消费者赚，还是靠收上游的过路费赚——后者迟早被反噬。"}, {"slug": "yeguofu", "no": 6, "title": "靠收进场费选品，必然把货越选越差", "quote": "“因为二三线品牌给的渠道费、上架费比一线品牌多。”", "take": "当你的收入来自谁给钱多，你的选择就会系统性地偏向出价高的烂货——激励机制会替你做决定。"}, {"slug": "yeguofu", "no": 7, "title": "真正好的东西不需要广告，差的东西才需要广告", "quote": "“真正的好的东西不需要广告，差的东西要广告。你见过任何东西，好的东西要广告？”", "take": "在砸预算做推广前先问一句：是产品撑不住才需要广告，还是产品本身就是广告？"}, {"slug": "yeguofu", "no": 8, "title": "无目的的逛街式发现消费，是电商替代不了的更大价值", "quote": "“我们很多到现场（买）东西是没有目的的，今天逛逛，逛了之后发现不错买一件……因为我们人是感性动物，很多需求是什么呢，你看到了就想要，但是你不看到你没这个想法。但是电商是什么？电商是现在天冷了我要买件衣服，我有需求了去买一件。”", "take": "电商满足&#x27;已有的需求&#x27;，线下创造&#x27;本来没有的需求&#x27;——能创造新需求的场景才是稀缺的。"}, {"slug": "yeguofu", "no": 9, "title": "情绪价值没有天花板，正因为它没有功能价值", "quote": "“以前主要讲究功能价值，现在是以潮玩解决一个情绪价值。潮玩是没有功能价值的，主要是解决情绪价值，所以情绪价值是没有天花板的，有无限的想象空间。名创优品就未来希望通过想象力来赚钱。”", "take": "功能有上限（够用就停），情绪没有上限（永远想要更多）——卖情绪比卖功能的天花板高得多。"}, {"slug": "yeguofu", "no": 10, "title": "只有开创新品类，才能走向全球", "quote": "“我认为一个企业要做大还是要开创新品类。为什么中国的很多服装品牌、鞋子品牌为什么出国不了？因为你没有创新，你的鞋子是仿别人的运动鞋，仿耐克的，你为什么你到美国你卖不掉。所以你一定，我认为一定要创新新的品类，市场没有的，你到哪个国家都吃得开；如果市场有的你就吃不开，很难。”", "take": "进一个成熟品类是去抢存量、必然厮杀；开一个新品类是去占空白、到哪都吃得开。要走出去，先问你创了没。"}, {"slug": "yeguofu", "no": 11, "title": "门店不是成本项，它本身就是广告位和流量入口", "quote": "“线下店不仅是这个店，还是流量入口啊、还是广告入口啊……那个店的本身就是广告，你生意越好越是广告。”", "take": "别把摊在面前的&#x27;成本&#x27;只当成本看——换个角度，它可能同时是你的广告牌、流量口和资产。"}, {"slug": "yeguofu", "no": 12, "title": "投资合伙人模式：加盟商只干两件事，找好铺、投钱", "quote": "“我们开创了一个新的加盟模式，叫&quot;投资合伙人&quot;。就是加盟商只负责投资、找铺，后面的装修、管理、运营全部总部包了……我们就做了严格的分工，你加盟商就只干两件事，只找好铺、投钱，剩下的管理、进货、营销、销售、收银、物流，用我们公司全包了。”", "take": "想规模化复制，就把活儿拆到&#x27;最不需要能力&#x27;的程度——让合作方只做他最擅长的一两件事，其余你全包。"}, {"slug": "yeguofu", "no": 13, "title": "靠产品本身说话，把门店管理难度降到最低", "quote": "“什么价格都很清楚，不需要——我们的店长、店员就做两件事：第一上货就行了，搞好卫生……不要促销也不要跟顾客搞关系，也不要看顾客脸色讲不同的话，都不用、不需要，就两件事……顾客来了好不好，我们靠产品说话，顾客进来了看产品，好就买不好就不买。所以我们通过产品标准化和产品的竞争力，大大地降低了门店的管理难度。”", "take": "与其训练每个人都成为销售高手，不如让产品强到不需要话术——把成败从&#x27;人的能力&#x27;转移到&#x27;产品的竞争力&#x27;。"}, {"slug": "yeguofu", "no": 14, "title": "店长用延迟激励老带新，可以指数级裂变", "quote": "“我们每一个店当时要带四个到五个店长，每带出一个店长我们要奖励三千块钱，但三千块钱不是马上给你……毕业之后给你一千五，剩下一千五要等这个店长到岗之后六个月之后再给你……一个店有五个店长，有100个店就有500个店长。”", "take": "想让数量翻倍增长，让每个人都去带人，并把奖金延迟兑现——既绑定培养质量，又把增长变成复利。"}, {"slug": "yeguofu", "no": 15, "title": "未来超市不是零售企业，是消费品企业，核心是自有品牌", "quote": "“我希望未来超市不是个超市、不是个零售企业，是个消费品企业，你要做好自有品牌……但是未来的超市要进入产品研发、不制造，要进入研发、设计、销售这三个，物流这四个环节都要做，你才能做好一个超市。”", "take": "别只当&#x27;进货来卖&#x27;的中间商，往上游走一步做研发设计——重新定义你的物种，价值天花板就抬高了。"}, {"slug": "yeguofu", "no": 16, "title": "买得到别处买不到的东西，你才有存在价值", "quote": "“你今天为什么山姆敢收会员费？就因为你在我这买到别的（地方）买不到的产品……你如果买的都是街边店也买得到的、别的超市普通超市也有的产品，你没有未来。”", "take": "凭什么别人专门来你这、还愿意多付钱？答案只有一个——你这有别处买不到的东西。没有差异化就没有未来。"}, {"slug": "yeguofu", "no": 17, "title": "对标但不照搬：做一个不收会员费、小包装的中国版山姆", "quote": "“我收购永辉的理想就是要做一个不收会员费的、小包装的中国版山姆。因为山姆有三大缺点：第一收会员费；第二大包装，买的便宜、用的贵，一半是浪费，这么大包装，中国小家庭。”", "take": "学标杆别整套照抄，先找出它在你这个市场水土不服的地方——那几个缺点，就是你的差异化机会。"}, {"slug": "yeguofu", "no": 18, "title": "好东西出口、差东西自留：拿下外贸供应商=最好品质最低价", "quote": "“所有的好东西，中国历来好东西都出口、差东西都自己用。”", "take": "想拿到又好又便宜的货源，去找那些专做出口的供应商——最好的产能一直在那里，只是没对内卖过。"}, {"slug": "yeguofu", "no": 19, "title": "没有年龄差异，只有认知差异", "quote": "“没有年龄差异，只有认知差异。这个跟年龄无关，跟认知有关。”", "take": "别拿&#x27;我这岁数了&#x27;当借口，跟不上的从来不是年龄，是你愿不愿意更新认知。"}, {"slug": "yeguofu", "no": 20, "title": "落后的真因是日子太好过、温水煮青蛙，人是被逼出来的", "quote": "“一个是懒，过去超市太好赚钱了，就是一进来收进场费。但是一个企业最难是开发新产品，不想干这个事情。过去日子好过，人都是被逼出来的，你我今天都是被逼出来的。”", "take": "赚钱太轻松，往往是退化的开始——它让你丧失了做最难那件事的动力。真正的能力都是被逼出来的。"}, {"slug": "yeguofu", "no": 21, "title": "表面的偶然其实是必然——十年前种下的种子，机会到了才发芽", "quote": "“后来想想，表面的偶然可能是必然。十年前种了一个种子，我们中国为什么没有这个超市，有个人这个使命一直在我内心隐藏着，突然爆发了，刚好胖东来自己自顾不暇，然后还愿意给这些新的企业家提供帮助，我也碰上这个机会。”", "take": "机会来临是偶然的，但你能不能抓住它，取决于多年前有没有埋下那颗种子。先种，再等风来。"}, {"slug": "yeguofu", "no": 22, "title": "开店好不好，一个小时看转化率就知道，不用熬时间", "quote": "“店一开张生意好不好，一个小时可以发现，不要说一天这么夸张。你顾客进来买不买？你进来了100个人，有多少转化率？”", "take": "判断一件事成不成，找到那个最硬的即时指标（转化率），别用&#x27;再观察观察&#x27;拖延决策。"}, {"slug": "yeguofu", "no": 23, "title": "电商杀死超市是借口，决定生死的是卖产品还是卖货架", "quote": "“这都是线下开店一个一个起来的，跟电商有关系吗？没有毛关系，靠什么？就是把产品做好。所以山姆和胖东来是卖产品的，其他超市是卖货架的，它本来区别在这里。所以卖产品的公司都好了，卖货架的公司全军覆没了，都不行了。”", "take": "当所有人把失败归给同一个外部原因（电商），先找反例：同样环境里谁活得好？答案往往在自己身上。"}, {"slug": "yeguofu", "no": 24, "title": "中国电商发达不是因为线下落后，而是物流便宜到一块钱一单", "quote": "“你想这是不敢想象的，一块钱，今天在中国能干什么事情？这个是中国电商高度发达的核心原因。如果物流很贵，你想想，如果今天中国政府说取消电动车、不用电动车送货，如果用汽车送货的话，你看物流、外卖送件会掉70%以上。”", "take": "解释一个现象别停在表层叙事，去找被忽视的物理基础——这里是一块钱的物流成本，不是&#x27;线下不行&#x27;。"}, {"slug": "yeguofu", "no": 25, "title": "国外大牌IP做得差，不是能力问题，是没见过更好的东西", "quote": "“他那些自有团队，他们是停留在过去时代。因为你来到中国，你见过更好的东西，所以你有落差，感觉他们做得不好；但是其他国家人认为他还做得不错。”", "take": "做得好不好，取决于你的参照系有多高——没见过更好的，就不会觉得自己差。多去见顶配。"}, {"slug": "yeguofu", "no": 26, "title": "线下生意藏不住也造不了假，电商生意只有自己知道", "quote": "“你生意好生意不好，你老板知道，顾客也知道，全社会都知道，你隐藏不了。不像电商公司，生意好你自己知道，别人不知道，数据还能造假，数据还刷单。”", "take": "判断一门生意是否真火，优先看那些&#x27;藏不住、造不了假&#x27;的信号——门口排不排队，比后台数据更可信。"}, {"slug": "yeguofu", "no": 27, "title": "13倍增长不是一般变革，是核变", "quote": "“我感觉这个不得了。一般的一项变革、改革，最多增长个20%、30%都不得了了，如果十几倍，这就这个叫什么变化？不是一般的变化，已经到了核变。”", "take": "用量级给变化定性：能改善20%-30%的是优化，能翻十几倍的是模式本身换了——别用同一把尺子衡量两件事。"}, {"slug": "renke", "no": 1, "title": "AI 作曲一定百分百超过人类——复杂只是还没被算力破译的东西", "quote": "“百分之百。归根结底还是算力和算法的问题，给予足够长的时间，算力增大一百倍一千倍一万倍，所有我们人类理解的复杂都能被破译。”", "take": "别把「人类创造力」供成 AI 的禁区——你以为不可还原的复杂，多半只是算力还没追上，趁早想清楚你的不可替代在哪。"}, {"slug": "renke", "no": 2, "title": "迪伦精神：不策划、不架构，让作品自己长出来，全凭感觉", "quote": "“我总结了一个东西叫&quot;迪伦精神&quot;，两层意思：一是表演上——这首歌原曲我这么写，但现场我想怎么唱怎么唱，旋律都改，故意改一点点（肯定在调里）；二是创作上——我不去策划、不去架构，让自己舒服、让它&quot;长出来&quot;，完全凭感觉。”", "take": "别先搭骨架再填血肉——给自己一个能即兴改动的余地，让东西边做边长，比照着蓝图执行更鲜活。"}, {"slug": "renke", "no": 3, "title": "你不是自己的观众：只能说你的感受，别替大众代言", "quote": "“但我从来没从观众层面去想这个问题，因为我不是自己的观众。我说我的感受，没办法替大众说话。”", "take": "停止脑补「大家会怎么想」——你猜不准大众，你唯一握得住的素材是你自己的真实感受，先把它说准。"}, {"slug": "renke", "no": 4, "title": "想做流行却「流行未遂」：瞧不上的东西，真要做好门槛也极高", "quote": "“我想要写流行歌，但可能是&quot;流行未遂&quot;。发现瞧不上的东西真要做好，门槛也很高。”", "take": "「看不上」不等于「做得到」——你随手鄙视的通俗活儿，自有一套你没掌握的高门槛，先放下傲慢去试一把。"}, {"slug": "renke", "no": 5, "title": "「长出来」比「插上去」可贵：歪瓜裂枣也胜过外加的设计", "quote": "“哪怕从一坨牛粪上长出来，它也是长出来的，更可贵——歪瓜裂枣也是长出来。就像你说王朔那个《动物凶猛》，他随意发出去，却造就了姜文一部很惊人的电影《阳光灿烂的日子》……你不知道哪个是更好的结果。它的命运就不是长成一本小说巨著，而是成为一部电影。”", "take": "别死磕你预设的「最佳形态」——东西自然长成的样子，可能比你硬加设计的更值钱，放手让它走它的命。"}, {"slug": "renke", "no": 6, "title": "美学是事后总结、源于缺陷：希腊白柱本有颜色，掉光了才成了美", "quote": "“美学很多是后边总结出来的，它产生的时候是自然而然的。你看希腊那些大柱子，当年很多是有颜色的，最后变成雪白，是几百年被风吹日晒掉光的——本来是事物&quot;不好的状态&quot;，但看得多了，大家感觉到另一种美感。所以我从来不刻意。”", "take": "别强行设计「美感」——很多美是缺陷被时间磨出来、事后才被命名的，你现在的「不好的状态」可能正是日后的风格。"}, {"slug": "renke", "no": 7, "title": "对资本无差别剥削：能剥削就都剥削，本来不想去，给太多了", "quote": "“赚钱。我对资本主义无差别的剥削——这些综艺节目我也一样，哪个都不歧视，能剥削就都剥削一下。本来不想去，但给的太多了。”", "take": "别用清高把钱推门外——把「上不上得了台面」换算成「给的够不够多」，是一种比道德化更清醒的交易立场。"}, {"slug": "renke", "no": 8, "title": "现在的高手不该酷，该没有存在感——越普通越好，直接隐入大众", "quote": "“你看阿兰·德龙演《独行杀手》很酷，但现在的杀手应该是非常正常、没有存在感的，人群中一扫就发现一个黑口罩，完了。所以我越普通越好，直接&quot;隐入大众&quot;。”", "take": "真正的低调不是装备酷，而是抹掉一切识别特征——你越想用「酷」来藏，越显眼；要藏就藏到平庸里去。"}, {"slug": "renke", "no": 9, "title": "旅行的心情：同一条街，换成游客或领导视察，体验全变", "quote": "“我在北京路看到那些白人旅行团在逛，我就想：他逛的跟我是同一条街，为什么他是旅行、我就不是？为什么人家那么愉快？我也愉快——我就把这叫“旅行的心情”。所以我后来在石牌东那条路，就经常以旅行的心情去走；甚至特意走一些平时没走过的路，换成游客的心态去看，或者换成“领导视察”的心情，到那儿就觉得“这个搞得不太好”。”", "take": "处境改不了就改框架——把通勤的老路当成第一次来的游客或来视察的领导走一遍，同一条街能刷出全新的体验。"}, {"slug": "renke", "no": 10, "title": "失败者美学：生平悲惨的曲子就练，生活富裕的就跳过", "quote": "“我买古典吉他的曲谱，每首曲子前面有作者介绍，生平很悲惨的我就要练一下，生活很富裕的我就跳过——有一种&quot;失败者美学&quot;。你看海明威的采访，人家问艺术家早年要什么，他说&quot;一个悲惨的童年&quot;，可能随口说，但有他道理。”", "take": "把模糊的审美偏好外化成一条可执行的筛选规则，挑学习对象时也能用——你信什么是养分，就让它当你的过滤器。"}, {"slug": "renke", "no": 11, "title": "故意胡说八道：很多答案是为听者定制的，不是为求真", "quote": "“我有时候会故意胡说八道，不是为了胡说八道，是为了说一个对方能接受的答案。但在你面前，我尽量说出那个真的答案。”", "take": "听别人讲话时先分清：他在给你「能接受的答案」还是「真的答案」——很多漂亮回答只是为你量身定制的。"}, {"slug": "heguangzhi", "no": 1, "title": "把最尴尬、最羞于启齿的事写出来，效果反而最好", "quote": "“你面对你最真实的自己、你面对你最尴尬的自己，就会好笑……我发现我经常羞于跟别人提及我住在终点站那个事，觉得不太好意思……然后我就把它写成段子，写完之后效果特别好。”", "take": "找素材时直奔你最不好意思说的那件事，越尴尬越真实，越真实越有共鸣。"}, {"slug": "heguangzhi", "no": 2, "title": "去离&quot;意义&quot;最近的地方写最干净的东西，别躲到远离利益的偏远处写脏活", "quote": "“你只需要让自己在离那个意义最近的地方，然后保持自己的初心，写最干净的段子就行了。你没有必要跑到一个最偏远的地方，远离那个利益的地方，写脏活，这不是你弄反了吗？”", "take": "别浪漫化&quot;去清净地方做纯粹的事&quot;，靠近资源中心同时守住作品质量才是正解。"}, {"slug": "heguangzhi", "no": 3, "title": "创作者的本分是写、是做，评价交给别人——不要在意评价，也不要去评价", "quote": "“你不要在意评价，而且你也不要去评价。我们是写段子的人，是做这个事的人，我们就写就完了，评价的事交给别人。”", "take": "把自己从评价漩涡里拨出来：你的位置是做，不是评，连评价别人也省了。"}, {"slug": "heguangzhi", "no": 4, "title": "老待在家里对创作没帮助——必须接触人、让事真实发生才有灵感", "quote": "“你老别在家里，对创作没有帮助，你必须得接触人、得这些事实地发生，才能有灵感创作。”", "take": "灵感不在书桌前，去和人接触、让生活真实发生，素材会自己长出来。"}, {"slug": "heguangzhi", "no": 5, "title": "先锋表达必须能落回大众——很多人观点装着装着就真飞了", "quote": "“他的一些观点也好、思维也好，是非常非的，但是他最后的落点能够落到跟大众一样，他能把大家拉回来……因为有很多人装着装着就装走了，就彻底真的飞了。”", "take": "再非主流的观点也要能落回大众，否则就是&quot;装走了&quot;，没人接得住。"}, {"slug": "heguangzhi", "no": 6, "title": "梗太大时观众会记住梗而忘掉观点——强度会反噬传播", "quote": "“其实它藏了一个观点，是越美的东西，对这个世界来讲就越残忍。……只是因为那个梗太大了，之后大家把观点给忘了。”", "take": "想让观点被记住，留神别让爆点太大盖过它——强度和信息留存常常打架。"}, {"slug": "heguangzhi", "no": 7, "title": "陈词滥调替换不掉，是因为它字面上太准了", "quote": "“这个虽然是陈词滥调，它其实字面上是很准的。”", "take": "别一味嫌套话土——有些话之所以成套话，正因为它准到没法替换。"}, {"slug": "heguangzhi", "no": 8, "title": "出牌双方都打明牌、互相吃透，但出牌的规则又变了", "quote": "“观众我吃透了，观众也把我们吃透了，他知道第六个段子应该会有一个 callback，我也猜到了。就是双方在打明牌，但这个出牌的规则好像又变了”", "take": "当套路被双方都摸透，光会套路已经不够，制胜点转移到了规则本身的变化上。"}, {"slug": "heguangzhi", "no": 9, "title": "收一点点钱反而提高到场率——因为人会怕&quot;白花的两块三毛三亏了&quot;", "quote": "“你收他两块三毛三之后，原本不来的人可能都会来。因为他不来就觉得这两块三毛三亏了；如果不要钱，他就觉得可去可不去”", "take": "想让人真来，别免费，收个象征性的小钱，损失厌恶会替你把人拉到场。"}, {"slug": "heguangzhi", "no": 10, "title": "电话销售跟内向外向毫无关系——靠的是一套规范话术，照念就行像机器人", "quote": "“他们在招聘的时候根本就不管你内向还是外向。因为他们有一套非常完整、规范的话术，我以前像机器人一样念就行。”", "take": "别用&quot;我性格不行&quot;给自己设限，标准化岗位拼的是话术系统，不是天生外不外向。"}, {"slug": "heguangzhi", "no": 11, "title": "销售像解数学题：对方说啥你说啥都是匹配好的，厉害的是把人性研究透的设计者", "quote": "“它有点像解数学题一样——对方说啥，你说啥，都是匹配好的。……其实是做那个课的人厉害，他把人性研究透了。而且销售这么些年发展下来，他们的话术也在不断地迭代，到最后到我们手里的那个东西全是精华，照着执行就行。”", "take": "价值往往沉淀在迭代多年的体系里而非一线个人，看清这点能帮你选对杠杆点。"}, {"slug": "heguangzhi", "no": 12, "title": "假装志在必得，先骗过别人，最后把自己也骗信了——气势靠自我催眠撑出来", "quote": "“我前两期就一直在硬撑，不能让别人看出来破绽，我就觉得假装志在必得。然后装着装着吧，大家就都信了，然后我也信了。我也没有段子，但是就在那硬志在必得。”", "take": "状态低谷时别等真自信，先装着志在必得，装到别人信、你自己也跟着信。"}, {"slug": "heguangzhi", "no": 13, "title": "当好人比当坏人简单：坏人方方面面不能露马脚，好人有一丝闪光就够吃一辈子", "quote": "“坏人方方面面都要把自己武装起来，你不能露出一丝的马脚；然后好人反而你可以全是马脚，你有一丝闪光的地方，就够你吃一辈子的。好人好做。”", "take": "当好人不是吃亏，是洞悉了规律的省力选择——好人门槛低、回报正向几率更大。"}, {"slug": "heguangzhi", "no": 14, "title": "我的善良其实是功利的——做好事之前我就已经盘算好可能有回报", "quote": "“我在去看那个电影的时候，其实我就已经盘算好可能会有意外收获了。就是我发现，有很多时候，我的善良是非常功利的，我就感觉能换东西回来。”", "take": "别急着给自己的善良贴道德标签，诚实承认它常常是功利的算计，反而更靠谱。"}, {"slug": "heguangzhi", "no": 15, "title": "没有下降空间时，最优解就是放手一搏", "quote": "“我又不是什么名牌学校毕业的，我做脱口秀并没有什么浪费的，我没有什么失去的，没有那个下降的空间了”", "take": "把&quot;敢不敢冒险&quot;换算成机会成本：一无所有恰恰是该行动的理由，不是不行动的借口。"}, {"slug": "heguangzhi", "no": 16, "title": "立一个&quot;不油滑&quot;的人设，其实是用人设把所有需要油滑的事都免掉", "quote": "“所谓你给自己立一个不油滑的人设，然后那些所有的事你就都不用操心去做了。其实我是觉得，油滑是一种能力，然后我不具备这个能力，那我就干脆给自己立一个不油滑的人设。”", "take": "把短板做成人设也是一种主动策略：承认&quot;我不会油滑&quot;，就省掉了一整类要应付的事。"}, {"slug": "heguangzhi", "no": 17, "title": "城乡结合部的孩子最容易自卑——因为有对比就有落差，纯村纯城反而没事", "quote": "“这种小孩是最容易自卑的。就如果你在乡镇里边反而没事，大家都是农村嘛，纯村里就没事。”", "take": "自卑常不是你脆弱，而是你恰好站在有对比对象的位置上——换个参照系就松了。"}, {"slug": "heguangzhi", "no": 18, "title": "脸皮厚一点、多表白几个，就不知道哪个撞上了", "quote": "“尤其脸皮厚一点，你多表白几个，就不知道哪个就撞上了。”", "take": "把表白（和很多机会）当成概率游戏：别因不敢而错过，多试几次总有撞上的。"}, {"slug": "heguangzhi", "no": 19, "title": "自信成不成立有硬标准：段子炸了、观众投票了，你就配得上一切", "quote": "“你只要是段子炸了，然后观众给你投票，你就是配得上所有的一切。你不能说你段子也没有，你就硬要、硬在那说&quot;我就配得上冠军&quot;，那也不行。”", "take": "别空谈配得感，用作品+真实反馈来检验自信，没作品的自信撑不住。"}, {"slug": "heguangzhi", "no": 20, "title": "一条被运气验证过的路，不该回头重新优化——你一旦重规划，可能就再也走不到今天", "quote": "“我但凡重新再规划一下那一万块钱的使用方法，说不定就没有今天了。我觉得就是一成不变，有运气的成分在，不能再变了，再变就可能就不行了。”", "take": "对已经成功的路保持敬畏：里面有运气，事后&quot;我本可以更优&quot;的复盘可能毁掉结果。"}, {"slug": "heguangzhi", "no": 21, "title": "亲友团的笑不是真实反馈——他们只笑内部梗，会骗你以为段子好使", "quote": "“然后你给亲友团演，他们笑不到点上，他们只笑内部梗。那个时候我就感觉内部梗好使——其实是因为只有在你提到你朋友的时候，大家才会笑。”", "take": "警惕&quot;虚假正反馈&quot;：友好的人为你而笑，会误导你以为方法管用，要去找真实观众。"}, {"slug": "heguangzhi", "no": 22, "title": "能坚持不是因为意志强，是因为这一路全是正反馈——所以我没立场劝别人坚持", "quote": "“我没有立场去劝别人&quot;你要坚持&quot;，因为我这一路走来全是上坡路。我之所以能坚持下来，是因为每天都很快乐。”", "take": "把&quot;坚持&quot;当结果而非原因：真正的变量是有没有持续收到鲜花掌声，而不是空喊意志。"}, {"slug": "heguangzhi", "no": 23, "title": "完成比完美更重要：你一直追求完美，就永远不会出发", "quote": "“你现在没做好，下一步就能做好；你现在不开始做、一直要去完美，你就永远不会出发，永远做不了这个事。”", "take": "先把活做完，差的下一版再补；事前把事准备到完美，是永远不会发生的事。"}, {"slug": "heguangzhi", "no": 24, "title": "最绝妙的想法要留到最关键的一仗，提前用掉就没有压箱底的硬货了", "quote": "“如果我在半决赛的时候，我如果提前动了总决赛的这两个想法，那我总决赛就没有东西打了，就没有特别硬的东西了。”", "take": "好牌留到决胜局：识别你的&quot;压箱底硬货&quot;，别在前哨战里提前打光弹药。"}, {"slug": "heguangzhi", "no": 25, "title": "题材很多但能力只够驾驭一个时，转型卡住是能力不足而非话题不够", "quote": "“那个时候的能力又不足以支撑更宽广的话题。就是话题很多，但我能驾驭的只有&quot;穷&quot;这一个。就导致转型还没有成功。”", "take": "想拓宽赛道却卡住，先别怪没题材，问自己驾驭新题材的能力够不够。"}, {"slug": "heguangzhi", "no": 26, "title": "买高配工具并不会让产出更快——升级设备和效率无关", "quote": "“我狠狠地买了个高配的，然后发现也不怎么用。就是你以为用高配的写段子那么更快，发现就没打开过几眼，还是用手机写。”", "take": "别用&quot;换个好工具&quot;来骗自己在进步，产出靠的是干，不是装备。"}, {"slug": "heguangzhi", "no": 27, "title": "成功未必靠天分，更多是时代审美恰好对上了你这一款——这是运气", "quote": "“每个进入这个行业的人都很有天分，只是这个时代的审美恰好是我这一款，我觉得这是我的运气。”", "take": "别把成功全归到自己头上，承认&quot;时代审美撞上你&quot;的运气成分，是清醒也是谦逊。"}, {"slug": "jiazhangke", "no": 1, "title": "演员演不好，90%是剧本的错——卡壳多半是剧本不近人情、说服不了人", "quote": "“后来我发现找自己的原因，就只要是演员这个突然卡壳，90%是剧本有问题。就你那个剧本可能不近人情，说服不了他，可能说服不了人家，进不去。”", "take": "别怪执行的人差，先回头查你给的本子是不是不近人情、自己都说服不了。"}, {"slug": "jiazhangke", "no": 2, "title": "艺术真正打动人的是&#x27;熟悉的陌生感&#x27;——把你熟视无睹的日常换个角度呈现", "quote": "“这个《黄土地》它带给我的是熟悉的陌生感。我没有用这样的角度看到、这样地观察我们的生活，我觉得它这个电影独特的观察角度就吸引了我。”", "take": "想抓住人，不必找新鲜题材，把大家熟视无睹的日常换个角度拍出来就够了。"}, {"slug": "jiazhangke", "no": 3, "title": "短剧靠&#x27;三宝题材&#x27;戳中底层屈辱感——它比电影更符合大众心理", "quote": "“唯一的可能就是短剧，我觉得它可能比电影更符合大众的心态、大众的心理。因为比如说短剧里面有很多题材是这种所谓反转，是这种个人的这种屈辱，然后再不停地反转。比如说我们说的三宝题材，保安、保姆、保洁。”", "take": "爆款不是&#x27;狗血&#x27;，是精准戳中了被压抑的屈辱感——先看清观众的真实情绪再下判断。"}, {"slug": "jiazhangke", "no": 4, "title": "短剧反转的内核：现实解决不了，就幻想自己其实是个更大的boss", "quote": "“但是你普遍的你能了解到大家的痛点在那，就解决不了这个问题，就寄希望于你是更大的boss。”", "take": "爆款叙事的引擎往往是心理代偿——现实给不了的尊严，就靠&#x27;我其实更大&#x27;的幻想补回来。"}, {"slug": "jiazhangke", "no": 5, "title": "为发表而硬上宏大叙事，反而写得差；不为发表的真诚表达更经得起时间", "quote": "“我发现我那些爱情诗比那个《黄河》写得好多了。那个《黄河》就属于想发表要来个严肃命题、宏大叙事。”", "take": "为了被看见而硬凹深刻，往往最差；真诚写自己在意的东西，反而更耐看。"}, {"slug": "jiazhangke", "no": 6, "title": "80年代一本书全民皆读，不是文学更高，而是出版物匮乏、选择太少", "quote": "“包括人们怀念80年代的文学，说一部小说家喻户晓、全民皆看，它也跟当时那个匮乏有关。我觉得今天并不能说今天的文学就下降了、水平就下降了，是选择太多了。”", "take": "别把&#x27;过去更好&#x27;当真——很多怀旧其实是当年没得选，不是当年质量更高。"}, {"slug": "jiazhangke", "no": 7, "title": "演员是很&#x27;生物性&#x27;的——晴天和阴天演同一场戏，需要调整的情绪都不一样", "quote": "“其实演员是很生物性的。就比如说今天阳光很好，这种演一场戏跟今天是阴天演一场戏，他需要的调整情绪是不一样的，他需要转化的、需要培育的。”", "take": "人的状态受天气、生理这些&#x27;软因素&#x27;牵动，带人做事别只盯结果，也要照顾当下的身体节律。"}, {"slug": "jiazhangke", "no": 8, "title": "图像擅长呈现结果与状态、缺少过程，这削弱了文学的广泛影响力", "quote": "“图像的擅长是结果，是实时的一个状态。所以人类的思维模式也在变化，你在一个图像为主、视频为主的这个时代，你苛求文学要有广泛的影响力，这个确实是很难的。”", "take": "图像给你结果和状态，文字给你过程——明白二者所长，才知道该用哪种介质讲你的东西。"}, {"slug": "jiazhangke", "no": 9, "title": "短剧难承载有分量的东西——篇幅就是天花板，像微型小说", "quote": "“我对这个事有一点怀疑，是我觉得它篇幅决定了就很难。你看以前小说有微型小说吗？微型小说可以写得很好玩很抓人，但是它很难承载一些有分量的东西。”", "take": "形式自带天花板，短平快能抓人但难承重——别指望一个轻量载体扛起厚重的东西。"}, {"slug": "jiazhangke", "no": 10, "title": "电影最美的地方，是对物质现实世界事无巨细的还原", "quote": "“但是电影这个媒介它最重要一个美感，是对这个世界能事无巨细地还原，这是它最美的地方。”", "take": "做内容先想清楚你这个介质最美在哪，再围着这个核心使劲，而不是堆技巧。"}, {"slug": "jiazhangke", "no": 11, "title": "短剧威胁不到电影——它占用的是碎片时间，跟看电影是不同的消费场景", "quote": "“其实你说完全没影响确实也会有一些影响，但是说威胁到电影我觉得还不至于。因为观看的，你比如说我看短剧我一般是睡觉前看一会儿，那睡觉前谁会去看电影，是不是，又不占你正常的看电影的时间。”", "take": "判断&#x27;新东西会不会杀死旧东西&#x27;，先看它们抢的是不是同一段时间——场景错位就不是真竞争。"}, {"slug": "jiazhangke", "no": 12, "title": "心灵丰富的人才爱打架——打架源于敏感、自尊与情感，不动感情的人不屑于打", "quote": "“我觉得心灵层次饱满丰富的人才爱打架，因为他经常是情感方面的原因才会打架。不动感情的人谁去打架，就不理你，走了就行了。高度的敏感性跟自尊性，包括这个情感的细腻，趋势到了一种程度才会打架。”", "take": "冲动不一定是粗鲁，往往是太在乎、太敏感——别急着把动感情的人当成没修养。"}, {"slug": "jiazhangke", "no": 13, "title": "心里有终极归宿就不拧巴——知道有个地方一定接纳你，遇事才从容", "quote": "“我觉得可能是不跟自己较劲，因为我自己一直有个归宿吧……我觉得我无论遇到什么样的问题，或者我人生起起伏伏，总有一个地方一定会接纳我，而且那个地方我一定会过得非常愉快。”", "take": "给自己留一个心里一定接纳你的退路，反而敢从容向前、不跟自己较劲。"}, {"slug": "jiazhangke", "no": 14, "title": "每个人都有偷偷喜欢的&#x27;丢人&#x27;东西——承认需求的复杂才是承认自己正常", "quote": "“这些音乐家跟我也承认，他们也在自己的曲库里有几首很丢人的歌，他就羞于承认他听那些歌，但那几首歌他听的时候每次都很愉快。所以我觉得人性就是很复杂，这个需求是很复杂的。”", "take": "别为自己偷偷喜欢的&#x27;低级&#x27;爱好羞愧，需求本就复杂，承认它才是承认自己是个正常人。"}, {"slug": "jiazhangke", "no": 15, "title": "限制不只是损失——它同时激发想象力，匮乏反而成了想象的养料", "quote": "“你说限制嘛，同时也激发了想象力。”", "take": "条件受限别只当倒霉，匮乏逼出来的想象力常常是别人没有的资源。"}, {"slug": "jiazhangke", "no": 16, "title": "很多&#x27;回不去&#x27;是你自己认定的——其实每个角落都有它的乐趣", "quote": "“我觉得有时候你回不去，是因为你回不去了，其实能回去，是你自己觉得回不去了，有什么回不去的，每个地方每个角落都有它的乐趣。”", "take": "&#x27;回不去&#x27;多半是心里设的限，不是事实——肯回头，前路反而没有后顾之忧。"}, {"slug": "jiazhangke", "no": 17, "title": "灵魂是十几岁才慢慢成形的，从立目标到找到方向之间的茫然是必经阶段", "quote": "“那么其实从这个还魂到你真正确立一个目标，它是需要时间的，就是很茫然的，而且生活本身的吸引力是很大的——开心啊，聊天、下棋、打麻将、喝酒、看电影，我觉得这是生活的全部内容了，你还要什么理想？”", "take": "找不到方向的那段茫然不是失败，是必经的过程——别因为一时没目标就否定自己。"}, {"slug": "jiazhangke", "no": 18, "title": "判断一件事值不值得当志业，看你会不会被自己做出来的东西打动", "quote": "“你如果一写感觉自己很被自己写的东西激动感染，你会往下走吗？……但是写的也还过关还可以，但是也没说是要作为我的职业。”", "take": "选不选一条路，别看&#x27;还行/过关&#x27;，看你做的时候会不会被自己做的东西激动——不激动就走不远。"}, {"slug": "jiazhangke", "no": 19, "title": "不要等条件成熟——你想象中的理想制作条件永远不会自动到来", "quote": "“没有条件成熟的时候，永远没有你想象中的制作条件。所有东西你说要成熟了你才去干，其实很难达到。”", "take": "别等万事俱备，理想条件永远不会自己来，先做起来。"}, {"slug": "jiazhangke", "no": 20, "title": "语感靠广泛沉浸式观看变成直觉，而不是逐镜拉片式的理性拆解", "quote": "“它并不是说你深入地研究每部电影，所谓拉片，一个镜头一个镜头那么去研究……在这个广泛的观看里面，逐渐会形成一个电影的感觉，就所谓语感。”", "take": "练任何手艺，先大量沉浸养出直觉，别一上来就逐帧拆解把感觉拆没了。"}, {"slug": "jiazhangke", "no": 21, "title": "作品诞生在哪个时代就是它的命运，别为&#x27;更好的条件&#x27;推迟创作", "quote": "“就跟孩子你出生在60年代还是70年代，这就是他的命运嘛，但不是说你怀孕了你不把这个孩子生下来，说我等等十年我让他生在80年代条件更好一些。”", "take": "你的作品属于它出生的当下，别为&#x27;十年后条件更好&#x27;而把它压着不生。"}, {"slug": "jiazhangke", "no": 22, "title": "真正坐下来要做时，最真实、最迫切、最揪心的东西总会优先", "quote": "“但是真的坐下来想拍的时候，你还是目前的这个感受里面最真实、最迫切的东西总会优先。”", "take": "脑子里的&#x27;聪明构思&#x27;很多，但动手时让当下最迫切、最揪心的那个先上——它才是真的。"}, {"slug": "zhengzhi", "no": 1, "title": "AI 把成本降下来，就是创作平权——有资源和没资源的人站到同一条起跑线", "quote": "“所以我觉得 AI 如果能把成本降下来，将来一个有资源、一个没资源的两个导演，他们的起点是一条起跑线。”", "take": "当成本不再是门槛，你没钱没资源也别认输，比的是想法，先把想法磨好。"}, {"slug": "zhengzhi", "no": 2, "title": "AI 时代成本指数级下降，对有想法的编剧导演是幸福时代，最后拼的就是想法", "quote": "“后边 AI 时代的话，我觉得对编剧、对导演都是一个很幸福的时代即将到来。”", "take": "工具门槛在塌，别再用「没条件」当借口，把劲全花在想法上。"}, {"slug": "zhengzhi", "no": 3, "title": "舍弃本身就是创作的一部分——留下什么、丢掉什么就是创作选择", "quote": "“舍弃也是创作的一部分，你留下什么、舍弃什么，这本身就是创作的选择。”", "take": "删掉的不是损失，是作品。把「砍什么」当成正经的创作动作来做。"}, {"slug": "zhengzhi", "no": 4, "title": "文学最本质就是「讲一个让人放不下的故事」，句式、结构、隐喻都是后加的", "quote": "“就是你还不明白&quot;文学&quot;两个字是什么东西的时候，扎根在脑子里的那个概念——就是讲一个让人放不下的故事，这就是我最早对文学的理解。”", "take": "做内容先保证「让人放不下」，技法是枝叶；抓人这件事永不过时。"}, {"slug": "zhengzhi", "no": 5, "title": "严肃文学的「好看」也是高超技巧在吊人——爱伦·坡靠技巧让你读完二十几页埋尸", "quote": "“在严肃文学里你也能看到，有一些很好看的故事，它只是用更高超的技巧吊住你，比如爱伦·坡，他就是吊你——就写一个人把妻子埋墙里了，这事二十几页就写这么一个事，他是怎么能勾着你。”", "take": "别拿「严肃」当不抓人的借口，深内容更要靠技巧把读者勾住。"}, {"slug": "zhengzhi", "no": 6, "title": "创作过程有很私密甚至羞耻的成分，所以作家凑一块根本不聊文学", "quote": "“写作有时候是很私密的，虽然你是写给很多人看，但那些人都不认识你，所以有一些写作甚至还有很私密的东西，虽然它最终是发表公开的，但实际上创作过程是有一些很私密、甚至有一些是羞耻的东西。”", "take": "你做内容时那点说不出口的私密感很正常，别因为它把作品藏起来。"}, {"slug": "zhengzhi", "no": 7, "title": "文学的底层审美就是「引人入胜」——读也好写也好，受不了闷的东西", "quote": "“文学作品你怎么写也好，但我一定喜欢，我读也好、写也好，要引人入胜。所以我本人就是受不了闷的东西，无论是看还是（写），我受不了闷的东西。”", "take": "守住一条底线：自己都觉得闷的东西，别指望别人看得下去。"}, {"slug": "zhengzhi", "no": 8, "title": "早期大量用方言不是表达需要，是急着锚定个人风格时抓的「风格化抓手」", "quote": "“它就是风格化的抓手。在那个阶段，是风格化的某种抓手。”", "take": "找风格期那些刻意的标志性手法，是抓手不是终点，过了那阶段该松手。"}, {"slug": "zhengzhi", "no": 9, "title": "未来越来越难有「全民关注」的艺术形式，大众兴趣只会越来越分散", "quote": "“我用了两三个大模型分析，结果结论差不多，逻辑推导都是差不多的结论：就是现在越来越难出现全民关注的一个艺术形式了，大家兴趣越来越分散。”", "take": "别再赌「破圈全民爆款」，做内容就认准把一小群人服务到位。"}, {"slug": "zhengzhi", "no": 10, "title": "营造好剧组氛围的真出发点是「让自己先舒服」，以自我为中心反而成全了集体", "quote": "“我觉得跟个性有关。实际上我也不是完全为了别人：如果我在一个工作环境当中有那种剑拔弩张的气氛，或者不舒服的，首先第一个不舒服的是我自己。所以我是围绕我自己为中心营造那么一个气氛。”", "take": "别硬端利他人设，承认「我要先舒服」反而能把整个团队的气氛带顺。"}, {"slug": "zhengzhi", "no": 11, "title": "开头太顺利会「反噬」——早期的顺遂是要用后来的坎坷来偿还的", "quote": "“所以后来这都是要反噬的，就是你开头太顺了，所以后边几年才会那么（坎坷）。”", "take": "起步顺到不真实时别上头，把它当债，提前为后面的坎做准备。"}, {"slug": "zhengzhi", "no": 12, "title": "把心态从「自我表达」换成「打磨工艺品」——哪怕只是抛光的小建议也吸纳", "quote": "“我觉得我这次创作新书、写小说新书的心态变成了一种打磨工艺品的心态，更稳了。就是哪怕别人提出只是一个抛光的（建议）、可能不影响什么大（局），但是抛了光会变得更亮、更吸引人，那个角度我都会琢磨，有用的我都吸纳。”", "take": "把作品当工艺品而非「我的表达」，对抛光级小建议也别抵触，照单琢磨。"}, {"slug": "zhengzhi", "no": 13, "title": "导演拍片的难处跟经验多寡无关，第一次和第一百次每次都有新的难处", "quote": "“我觉得不管一个导演，你是第一次拍还是第一百次拍，每次肯定都有新的难处。”", "take": "别指望熟了就顺，每个新项目都有新坑，把「遇到新难处」当常态。"}, {"slug": "zhengzhi", "no": 14, "title": "把营造愉快的剧组氛围当成导演的核心能力，而非可有可无的软技能", "quote": "“我对自己这点挺骄傲的，我自己做导演最看重的是这个，我认为这是导演在艺术创作之外额外的能力。”", "take": "别把「让大家干得舒服」当锦上添花，它就是你这个岗位的硬能力之一。"}, {"slug": "zhengzhi", "no": 15, "title": "野路子（擦边、网络连载）不是污点，恰恰是最宝贵的东西——你在那学会了怎么吊住人", "quote": "“我现在是非常正视这个事：我很珍惜自己野路子出来的这个路径、经历，这是我最宝贵的东西。比如我写过那种擦边的，我在那里也学到东西——我知道怎么写东西是能吊住人的。”", "take": "别为自己「不正规」的来路羞耻，把它翻译成你独有的硬本事。"}, {"slug": "zhengzhi", "no": 16, "title": "把鸡汤写到百万千万销量也是真本事——你瞧不上，但你想写也写不来", "quote": "“后来就发现那玩意也是本事——你想把鸡汤写好了、卖成那种百万千万级销量，那也是个本事，就是你发现你来不了、你想来来不了。”", "take": "对你看不起的爆款先别急着鄙视，问自己「我真做得来吗」，多半做不来。"}, {"slug": "zhengzhi", "no": 17, "title": "重看一部经典感受变了，不是片子变了，是你变了", "quote": "“我觉得就是跟你个人生命经验有关，你所积累的阅历和你看待世界的情感浓度，你重新看，并不是因为这个片子变了，而是你变了。”", "take": "对老东西重新有感觉时，别归功于「它好」，去看自己长了什么。"}, {"slug": "zhengzhi", "no": 18, "title": "长期一个人干活会养成「别人说啥有道理我就不想听」的毛病，要警惕这种封闭", "quote": "“有一度就是说别人说什么有道理我就不想听，有那么一度，完全一直写作的话容易有这个（毛病）。”", "take": "独自闷头做事时，留意自己是不是开始本能地排斥正确意见。"}, {"slug": "zhengzhi", "no": 19, "title": "创作母题一辈子就那么几个，当众把它直白说出来反而是损失", "quote": "“一个人一辈子能引发你创作冲动的素材其实就那么点，就那么几个母题。然后你以那种口述的方式当众表露出来，对你以前以后作品的解读、对你职业生涯某种溯源上的（影响），其实不是什么太好的事。”", "take": "你真正的驱动力就那几样，别为了显得坦诚而把底牌全摊在台面上。"}, {"slug": "zhengzhi", "no": 20, "title": "雅俗共赏的那种「难」是创作能力本身的难，不是运气", "quote": "“他这种人呢，又没有委屈了大众观众，然后艺术上想表达的也表达，这个是非常非常难的。”", "take": "看到既叫好又叫座的人，别用「他运气好」打发，那是硬实力，值得学。"}, {"slug": "lixiang-ai", "no": 1, "title": "这一波AI既是生产力又是劳动力，所以&quot;一个人公司&quot;根本不成立", "quote": "“我觉得这一波AI的最大的变化，其实它既是生产力又是劳动力。生产力和劳动力最大的表现其实就是提升效率……它非常依赖技术本身。它是生产力加劳动力，本身就必须特别依赖于生产环境，所以有生产环境的大家干得可带劲了。但是呢，你一个个体怎么构建生产环境？”", "take": "你想靠AI单干成&quot;一人公司&quot;前先问自己：你的生产环境从哪来？没有真实业务环境，AI的劳动力属性就用不出来。"}, {"slug": "lixiang-ai", "no": 2, "title": "Agent需要真实生产环境才能闭环，普通用户玩着玩着就觉得AI没意思", "quote": "“Agent有一个挺重要的一点，就是Agent非常需要一个完整的工作生产环境，它必须得有你真实的任务生产环境，你才能获得良好的反馈，才能获得整个工作链条的一个结果。普通的用户玩着玩着其实就会没意思了，因为它没有一个生产的反馈。”", "take": "如果你觉得AI&quot;也就那样&quot;，别急着下结论——你大概率只是缺一个能拿到真实反馈的任务环境，没把它接进你的活里。"}, {"slug": "lixiang-ai", "no": 3, "title": "AI不会替代专业人士，反而把他们放大十倍一百倍", "quote": "“就一个普通人做出来的那个代码，那个可用性差到极致，更不要说往大规模去部署了，那基本上对他们来说就是个灾难……我说原来是两三倍，现在其实十倍一百倍。”", "take": "怕被AI替代？真正被放大的是有专业深度的人。别只学会让AI出活，要让自己变成那个能把AI出的活用到可部署的人。"}, {"slug": "lixiang-ai", "no": 4, "title": "用户要的不是记忆而是记录——记忆老瞎整理，记录才是真需求", "quote": "“同时还有第四个，其实你要的不是记忆，你要的是记录。因为记忆它老给你瞎整理，你要的其实是个记录。其实包括我们在车上，包括后边眼镜，最重要的是首先得把记录做好，记录这件事一定要做好。”", "take": "做AI产品别一上来堆&quot;记忆&quot;——用户多半只要忠实的记录，而不要一个会自作主张瞎整理的黑盒。"}, {"slug": "lixiang-ai", "no": 5, "title": "Agent的&quot;记忆&quot;是个糟糕定义：它只是Markdown文件，越用收益越差", "quote": "“我基本上被他记忆给搞快搞疯掉了，就我越用其实我收益越差……就今天这个记忆是一个，是一个糟糕的定义。因为他做了一些Markdown文件，其实他不是真正的记忆，明白，然后呢反而它变成了一种伤，一种非常糟糕的伤，就是任何的时候都把这个东西读到你的这个上下文里去，是效率全浪费这上面了。”", "take": "别盲目堆Agent的&quot;记忆&quot;——把一堆Markdown塞进上下文，不是能力是负担。该忘的让它忘，效率才不被吃掉。"}, {"slug": "lixiang-ai", "no": 6, "title": "选择了泛化就放弃了确定性，所以Agent、Chatbot、知识图谱要明确隔离", "quote": "“今天我觉得AI有一个很大的一个特点，就是说当你选择了泛化，其实你就放弃了确定性，因为这两个某种程度是冲突的。就是我仍然能保证我知识图谱那是很稳定的，那其他的我真的得运行一段时间，其实才知道。”", "take": "需要确定结果的事就别交给泛化的大模型，需要灵活的事就别用死规则——按确定性把它们隔开，别混成一锅。"}, {"slug": "lixiang-ai", "no": 7, "title": "车机用户其实有五种需求，不该全用Agent，一秒能搞定的事别花几万Token", "quote": "“一个C端的用户其实不要去拿什么记忆的用户来定义，就直接看它的需求。我认为一个用户会有五种需求：第一个需求是我有一些泛化的任务你要帮我完成，这是Agent去做的，就跟OpenClaw是一样的；第二个是我要有泛化的获取信息的需求，这个就跟豆包啊什么比较相似；第三个其实是精确的控制——空调啊，包括我去找一些APP。因为你今天会发现，如果你拿OpenClaw你问个上海的天气，四五分钟过去了，然后消耗了这个好几万的Token，毫无必要；那如果你在我们车上非常好的，机面出来天气都告诉你，一秒钟都不到，Token消耗几乎可以忽略不计，本地那个算力就够了。”", "take": "别用最重的Agent去办最轻的事。先把需求分类，简单确定的走快路径，复杂泛化的才上Agent。"}, {"slug": "lixiang-ai", "no": 8, "title": "AI是半神：全能还做不到，但全知已经做到了", "quote": "“他虽然现在做不到全能，但全知是已经做到了，算是半神吧。全知全能的我们叫神嘛，他这个全知能做到，就是全能还做不到，所以就是个半神。”", "take": "用AI时记住它的边界：知道得比你多（全知），但不一定能替你把事干成（全能）。拿它当顾问，别当全自动执行器。"}, {"slug": "lixiang-ai", "no": 9, "title": "AI很难靠发布会讲明白，因为它需要大量上下文，所以厂商只能靠播客讲AI", "quote": "“你今天讲一个Agent，或者你讲甚至你讲一个具身怎么样的话，它需要大量的上下文，所以你今天很难靠一个发布会把这种讲明白……他们很多时候想把AI讲明白的，只能靠播客，因为播客大家在聊的时候其实有足够的上下文……单纯发布会很难讲明白，所以发布会大家什么，就是讲硬件了。”", "take": "讲复杂的东西别硬塞进短时间——它需要上下文铺垫。该用长形式（播客、长文）就别用一页PPT糊弄。"}, {"slug": "lixiang-ai", "no": 10, "title": "AI加杠杆后竞争没变：二八变二九八，但能撞到用户手机上的App一个都没多", "quote": "“过去我经常开玩笑说，过去是20%的人顶级、80%的人普通，但有了AI、加了杠杆以后，可能会变成2%的人顶级、98%的人普通。所以竞争没变，你可以每天比人类多做10倍的App，但是能撞到用户手机上的App一个都没多。所以我说本质上竞争没变。”", "take": "别以为AI让你产量翻十倍就赢了——能造的多了，能被用户看见的没多。先抢用户价值，不是抢产量。"}, {"slug": "lixiang-ai", "no": 11, "title": "创新不一定是壁垒：人才会流动、供应商不排他，你研发的东西就被卖给别人", "quote": "“但是呢，我们有一个很大的感触，就是这个创新并不一定它有竞争力，但不一定能形成壁垒。这个为什么？因为人才是流动的，供应商我们也不能做排他，所以我们研发的东西供应商就可以卖给别人。”", "take": "别把&quot;我有创新&quot;当成护城河——人才和供应商都会把你的know-how带走。要问的是：这东西凭什么别人抄不走。"}, {"slug": "lixiang-ai", "no": 12, "title": "AI时代不要裁人，因为新标准下你很容易把最好的人裁掉", "quote": "“我的一个建议是所有公司不要裁人，因为在AI时代的人才和你上个时代的标准大概率是不一样的。你上来就裁人，很容易按照上个时代的标准把最好的人裁掉了。”", "take": "用旧标尺裁人，你裁掉的可能正是新时代最值钱的人。换标准之前，别急着下刀。"}, {"slug": "lixiang-ai", "no": 13, "title": "成规模企业应把超级个体留在体内创业，比他出去从零创业好得多", "quote": "“如果你是个成规模的企业，有足够的生产环境，你为什么不把这些人——认为他其实就在你的体内在创业——你只要给他价值评估到位了，其实他在你的环境里创业，比他出去从零创造一个环境去创业要好得多。”", "take": "想留住能折腾的牛人，别只靠涨薪——给他价值评估和真实环境，让他在你体内创业，比逼他出走划算得多。"}, {"slug": "lixiang-ai", "no": 14, "title": "真正的壁垒是电池和推理芯片，模型可能是竞争但不一定是壁垒", "quote": "“其实我们甚至认为模型可能是竞争，但不一定是壁垒——我们能看到最后的壁垒是推理芯片，甚至都不是训练芯片……我们要想真正在这个领域建立核心的技术壁垒，真正的壁垒其实必须去做芯片……而且要想把芯片做好，你必须模型、操作系统和感知都要自己做。”", "take": "分清&quot;竞争&quot;和&quot;壁垒&quot;：能让你赢一时的是竞争力，别人拿不走的才是壁垒。投入前先想清你在建哪一个。"}, {"slug": "lixiang-ai", "no": 15, "title": "机器人最大的商业机会是上料和搬运，不是拧螺丝和高精度分拣", "quote": "“我觉得这是商业机会啊，这是个最大的商业机会……搬运、上料不需要那么强的精度，而且一个工厂里单一工种的用量就是最大的……是我认为可能真的是具身机器人从零到一的第一个重要的战场。”", "take": "找新技术的第一个市场，别盯最炫的高难度场景——找精度要求低、单一工种用量最大的活，那里才好从零到一。"}, {"slug": "lixiang-ai", "no": 16, "title": "Token消耗排前的人不是旧标准下的顶级员工，而是嘴跟不上脑子的技术高手", "quote": "“他们普遍是脑子极为聪明，但是嘴跟不上脑子，所以在过去没有AI、没有Agent的时候，他们其实比较吃亏。比如他去抢资源、去见人说人话见鬼说鬼话，他们就很吃亏，很多技术高手这样。而且由于长期遭遇负反馈，他们说话能力就越来越差、不爱说话。但是他跟机器的对话没有任何问题。”", "take": "如果你是&quot;脑子比嘴快&quot;那类人，过去吃亏的地方现在反而是优势——你跟机器对话没有社交损耗，去把Token喂满。"}, {"slug": "lixiang-ai", "no": 17, "title": "AI是照妖镜和放大镜：过去能藏的东西今天藏不了", "quote": "“如果你管理好的话，其实不行的人会自己走。因为两种人，一直觉得自己不行的人会走，觉得公司不行的人也会走。我老说一个问题，我说其实本身AI和AI Agent是一个照妖镜、是一个放大镜，你过去能藏的东西今天藏不了，你对公司的不满也会放大，你自己能力的不行也会被放大。”", "take": "AI会放大你真实的能力和真实的态度——别指望靠流程和话术继续藏，去补真本事，那是唯一藏不住也跑不掉的东西。"}, {"slug": "lixiang-ai", "no": 18, "title": "收入涨三倍而能力只涨两三成，是管理危机的根源：身体一千亿，管理水平五六百亿", "quote": "“我们一年收入涨了三倍。那我就问一个问题，我们有没有可能一年能力涨三倍？所以我们可能能力涨了20%、30%，但是营业收入规模涨了三倍……你可能是一个七八百亿的，或者五六百亿的管理水平，但是你已经变成一千多亿的一个身体了。”", "take": "当外部增长远快过你内功增长时，危机就埋下了。增长顺时反而要警惕：你的能力跟得上你的体量吗？"}, {"slug": "lixiang-ai", "no": 19, "title": "科技进步最大的好处是把顶级富豪的生活给到几十亿人，而非替代工作", "quote": "“那我们要做的就是如何把这些顶级富豪拥有的生活给到更多的人，让几亿人、几十亿人也能消费得起的结果，这是科技进步带来的最大的好处，而不是天天想着怎么去替代各种工作。”", "take": "面对新技术，与其焦虑&quot;它会抢谁的饭碗&quot;，不如问&quot;它能把什么好东西普及给更多人&quot;——后者才是机会所在。"}, {"slug": "lixiang-ai", "no": 20, "title": "做AI不是冒险，不做才是冒险；团队从你的预算和最难时停不停AI来判断你真信还是装", "quote": "“你在最难的时候你停不停AI的东西，大家会看你的所有的判断和举动的……所以我自己认为其实我们做AI不是冒险，我觉得不做才是冒险……我觉得一定有一波人是不信的，你多么努力去讲、多么努力去做，其实我觉得一定有百分之二三十人就是不信的，这个你没有办法避免，但最后反正执行出来了是结果。”", "take": "想让人信你的决心，不靠多讲故事，靠你在最难时怎么分预算、砍不砍这件事。别指望说服所有人，二三成不信很正常，结果会说话。"}, {"slug": "lixiang-ai", "no": 21, "title": "评估团队做得最好的是校招生，因为评的是能力不是功能，旧知识反成负资产", "quote": "“对。因为说白了，你评估的是能力，不是评估的功能。我们做的所有的产品，都是在评估功能，但是AI评估的是能力，成本也是能力、性能也是能力，所以原来是无定式的反倒更好。我们会发现一帮校招生做得特别好。”", "take": "进入新领域时，你过去的&quot;经验&quot;可能是包袱不是资产——把已知答案先清空，按能力而不是按老套路去解题。"}, {"slug": "lixiang-ai", "no": 22, "title": "AI破一言堂：它出方案时自带反向意见，直接把博弈带出来了", "quote": "“那今天有了AI以后，这个东西其实不成立了。包括过去的时候我们老说一个问题，公司只有一言堂、没有反向意见；其实今天AI出方案的时候是带着反向意见的，就直接把博弈带出来了。”", "take": "做决策时主动让AI给你出几个方案并附反对意见——它天然会暴露你一个人想不到的博弈面，逼你别一言堂。"}, {"slug": "lixiang-ai", "no": 23, "title": "学AI不能听别人讲，必须自己真正去用，因为不同人用出来不一样", "quote": "“我觉得这200多天其实最重要的还是学AI。因为AI这东西你不能听别人讲，你得自己真正去用，因为它的范围太广了，而且不同人用出来是不一样的。”", "take": "别再刷别人怎么用AI的视频了——它因人因事而异，你必须亲手在自己的任务里跑出体感，才算真懂。"}, {"slug": "lixiang-ai", "no": 24, "title": "企业最致命的危机是战略错误：组织出问题能调，战略错了连机会都没有", "quote": "“如果你战略判断错了，你连调整的机会都没有了，所以辛苦都白费了……组织出现问题要调两到三年；然后战略出现问题可能就输了，就跟当年柯达这些都是选择出的问题，不是没有能力。那其他的出了问题就可能六个月到十二个月就能修复。”", "take": "把精力先放在&quot;选对方向&quot;上——执行错了几个月能补，方向错了再努力都白费。别用战术上的勤奋掩盖战略上的懒。"}, {"slug": "lixiang-ai", "no": 25, "title": "组织应按人体结构而非功能设计：做模型和做Agent的团队要完全分离", "quote": "“做软件和做Agent团队的这帮人，老想自己去做点模型，包括做不了的话就拿一个开源的瞎改一改，然后再用点这个LoRA这种方式。这就特别像那些动物，就是手脚上非得长个小脑，我说这是个低级动物的做法。”", "take": "别让执行的手脚去硬长一个小脑袋——专业的事交给专业的器官。看到团队&quot;什么都想自己沾一点&quot;，多半是设计错了。"}, {"slug": "lixiang-ai", "no": 26, "title": "无人驾驶了买车不会减少反而更多，因为决定需求的是道路供给不是车的供给", "quote": "“网约车足够便宜、足够多的，大家还是会继续买车，只要有条件……就是因为这里边一个最大的一个问题，就是道路是有限的，没有办法增加更多供给，因为在你最需要车的时候供给仍然供不上，因为它并不是由车的供给决定的，是由道路的供给来决定的。”", "take": "判断一个趋势别只盯眼前的那个变量——找出真正的瓶颈在哪。这里瓶颈是路不是车，结论就反过来了。"}, {"slug": "lixiang-ai", "no": 27, "title": "重大技术路线不是赌，是用140万字资料和顶级专家验证出来的", "quote": "“没有赌的，我们做了140万字的一个资料来验证这件事情，然后也跟一些最顶级的处理器的专家，包括像Jim Keller这样的，我们跟他聊完以后，对，然后他也认为这是一条以后主流的、对于AI而言主流的一个技术的架构。”", "take": "面对要命的大决策，别用&quot;赌&quot;来安慰自己——把它拆成可验证的功课：把资料做到底、找真正的顶级专家对一遍。"}],GNAME={"tim": "影视飓风 Tim", "zhouhongyi": "周鸿祎", "lixiang": "李想", "hexiaopeng": "何小鹏", "yeguofu": "叶国富", "renke": "仁科", "heguangzhi": "何广智", "jiazhangke": "贾樟柯", "zhengzhi": "郑执", "lixiang-ai": "李想（AI专场）"};
var RL={"meh": "无感", "interesting": "有点意思", "think": "值得思考"};
function loadR(){try{return JSON.parse(localStorage.getItem('vp-reactions')||'{}')}catch(e){return{}}}
var R=loadR(),tab='all',gsel='all';
var grid=document.getElementById('grid'),empty=document.getElementById('empty');
function render(){
 R=loadR();var ks=Object.keys(R);
 document.getElementById('cnt').textContent=ks.length?('共标记 '+ks.length+' 条'):'';
 var items=DATA.filter(function(c){var id=c.slug+':'+c.no;
  return R[id]&&(tab==='all'||R[id]===tab)&&(gsel==='all'||c.slug===gsel)});
 grid.innerHTML=items.map(function(c){var id=c.slug+':'+c.no;
  return '<div class="c">'
  +'<div class="row"><span class="gn">'+GNAME[c.slug]+' · No.'+c.no+'</span><span class="rxe">'+RL[R[id]]+'</span></div>'
  +'<h3>'+c.title+'</h3><div class="q">'+c.quote+'</div><div class="tk">'+c.take+'</div>'
  +'<div class="ft"><a class="go" href="../'+c.slug+'/cards/#c'+c.no+'">回看原卡 →</a>'
  +'<button class="rm" data-id="'+id+'">取消</button></div></div>'}).join('');
 empty.style.display=items.length?'none':'block';
 grid.style.display=items.length?'grid':'none';
 Array.prototype.forEach.call(grid.querySelectorAll('.rm'),function(b){
  b.onclick=function(){var r=loadR();delete r[b.dataset.id];
   localStorage.setItem('vp-reactions',JSON.stringify(r));render()}})}
Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(b){
 b.onclick=function(){Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(x){x.classList.remove('on')});
  b.classList.add('on');tab=b.dataset.t;render()}});
Array.prototype.forEach.call(document.querySelectorAll('.gb'),function(b){
 b.onclick=function(){Array.prototype.forEach.call(document.querySelectorAll('.gb'),function(x){x.classList.remove('on')});
  b.classList.add('on');gsel=b.dataset.g;render()}});
render();
</script>
